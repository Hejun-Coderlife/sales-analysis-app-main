<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 - 销售数据分析系统</title>
  <style>
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:#f3f6fb;
      color:#111827;
    }
    .wrap{ max-width:1100px; margin:24px auto; padding:0 16px; }
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:16px;
    }
    .btn{
      border:none;
      border-radius:10px;
      min-height:38px;
      padding:0 14px;
      cursor:pointer;
      font-weight:600;
    }
    .btn-primary{ background:#2563eb; color:#fff; }
    .btn-light{ background:#e5e7eb; color:#111827; }
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:14px;
    }
    .card{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:14px;
      padding:16px;
      box-shadow:0 10px 24px rgba(2,6,23,.06);
    }
    h1{ margin:0; font-size:22px; }
    h2{ margin:0 0 8px; font-size:17px; }
    p{ margin:0; color:#4b5563; font-size:13px; line-height:1.45; }
    table{ width:100%; border-collapse:collapse; margin-top:10px; font-size:13px; }
    th,td{ border-bottom:1px solid #e5e7eb; padding:8px 6px; text-align:left; }
    .meta{ font-size:12px; color:#6b7280; margin-top:8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div>
        <h1>管理后台</h1>
        <p>当前为第一阶段占位页面：用户、权限、数据导入能力将在后续完善。</p>
      </div>
      <div>
        <button id="toDashboardBtn" class="btn btn-light">数据看板</button>
        <button id="logoutBtn" class="btn btn-primary">退出登录</button>
      </div>
    </header>

    <section class="grid">
      <article class="card">
        <h2>用户管理（占位）</h2>
        <p>此区域展示当前账号、角色与启用状态。</p>
        <div id="userListWrap" class="meta">加载中...</div>
      </article>
      <article class="card">
        <h2>权限管理（占位）</h2>
        <p>角色与数据范围配置界面将在下一阶段接入。</p>
      </article>
      <article class="card">
        <h2>数据导入（占位）</h2>
        <p>仅管理员可用的数据导入面板将在下一阶段接入正式流程。</p>
      </article>
    </section>
  </div>

  <script>
    document.getElementById('toDashboardBtn').addEventListener('click', () => {
      window.location.href = '/dashboard';
    });
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/login';
    });
    (async () => {
      const meRes = await fetch('/api/auth/me');
      if (!meRes.ok) {
        window.location.href = '/login';
        return;
      }
      const usersRes = await fetch('/api/admin/users');
      const usersData = await usersRes.json();
      const wrap = document.getElementById('userListWrap');
      if (!usersRes.ok) {
        wrap.textContent = usersData.error || '用户列表加载失败';
        return;
      }
      const rows = usersData.users || [];
      if (!rows.length) {
        wrap.textContent = '暂无用户';
        return;
      }
      const roleMap = {
        admin: '管理员',
        manager: '经理',
        store_user: '门店用户',
        salesperson: '销售员',
      };
      const head = '<table><thead><tr><th>账号</th><th>角色</th><th>状态</th></tr></thead><tbody>';
      const body = rows.map((u) => '<tr><td>' + u.username + '</td><td>' + (roleMap[u.role] || u.role) + '</td><td>' + (u.enabled ? '启用' : '停用') + '</td></tr>').join('');
      wrap.innerHTML = head + body + '</tbody></table><div class=\"meta\">当前为只读占位，后续支持编辑。</div>';
    })();
  </script>
</body>
</html>
