<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 - 赫眉经营助手</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#fff;
      --line:#e5e7eb;
      --text:#111827;
      --muted:#6b7280;
      --primary:#2563eb;
      --ok:#166534;
      --err:#b91c1c;
      --shell-h:calc(100vh - 108px);
      --left-w:290px;
      --right-w:330px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
    .mobile-tip{display:none;margin:0;padding:12px 16px;background:#fef3c7;color:#92400e;border-bottom:1px solid #fbbf24;text-align:center}
    .container{height:100%;padding:14px 16px 16px;display:flex;flex-direction:column;max-width:none}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    .topbar h1{margin:0;font-size:24px}
    .topbar p{margin:6px 0 0;color:var(--muted);font-size:13px}
    .btn{border:none;border-radius:10px;min-height:36px;padding:0 14px;font-weight:600;cursor:pointer}
    .btn:disabled{opacity:.7;cursor:not-allowed}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-light{background:#e5e7eb;color:#111827}
    .btn-danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
    .layout{height:var(--shell-h);display:grid;grid-template-columns:var(--left-w) minmax(0,1fr) var(--right-w);gap:12px;align-items:stretch}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 22px rgba(2,6,23,.06)}
    .left,.center,.right{min-height:0}
    .left{display:flex;flex-direction:column;overflow:hidden}
    .left .head{padding:12px;border-bottom:1px solid var(--line);font-weight:700}
    .tree-wrap{padding:10px;overflow:auto;min-height:0}
    .tree-node{width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 10px;font-size:13px;cursor:pointer;margin-bottom:6px}
    .tree-node.active{border-color:#93c5fd;background:#eff6ff;color:#1d4ed8}
    .center{display:flex;flex-direction:column;overflow:hidden}
    .tabs{display:flex;gap:8px;padding:10px 12px 0}
    .tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer}
    .tab.active{background:#eff6ff;border-color:#93c5fd;color:#1d4ed8}
    .panel{display:none;min-height:0;flex:1;padding:10px 12px 12px}
    .panel.active{display:flex;flex-direction:column}
    .filters{display:grid;grid-template-columns:1.4fr repeat(3,1fr) auto auto auto;gap:8px;align-items:end;margin-bottom:10px}
    .field{display:flex;flex-direction:column;gap:4px}
    .field label{font-size:12px;color:#374151}
    .field input,.field select,.field textarea{min-height:36px;border:1px solid #d1d5db;border-radius:8px;padding:6px 10px;font-size:13px;font-family:inherit}
    .field textarea{min-height:56px;resize:vertical}
    .table-shell{border:1px solid var(--line);border-radius:10px;overflow:auto;min-height:0;flex:1;background:#fff}
    table{width:100%;border-collapse:separate;border-spacing:0;min-width:1300px;font-size:13px}
    th,td{border-bottom:1px solid var(--line);padding:8px 6px;text-align:left;white-space:nowrap;background:#fff}
    th{position:sticky;top:0;z-index:6;background:#f8fafc}
    th.sticky-left,td.sticky-left{position:sticky;left:0;z-index:5;box-shadow:1px 0 0 var(--line)}
    th.sticky-right,td.sticky-right{position:sticky;right:0;z-index:5;box-shadow:-1px 0 0 var(--line)}
    th.sticky-right-2,td.sticky-right-2{position:sticky;right:86px;z-index:5;box-shadow:-1px 0 0 var(--line)}
    .cell-actions{display:flex;gap:6px}
    .muted{color:var(--muted);font-size:12px}
    .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px;border:1px solid}
    .badge-ok{color:#166534;background:#dcfce7;border-color:#bbf7d0}
    .badge-off{color:#7f1d1d;background:#fee2e2;border-color:#fecaca}
    .right{display:flex;flex-direction:column;overflow:auto;gap:10px;padding:0}
    .side-card{padding:12px}
    .side-card h3{margin:0 0 8px;font-size:15px}
    .meta{font-size:12px;color:var(--muted);line-height:1.45}
    .meta.ok{color:var(--ok)}
    .meta.err{color:var(--err)}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .role-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;overflow:auto;padding-right:4px}
    .role-card{border:1px solid var(--line);border-radius:10px;padding:10px;background:#fff}
    .tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px;border:1px solid #bfdbfe;background:#eff6ff;color:#1d4ed8;margin:2px 4px 0 0}
    .drawer-mask,.modal-mask{position:fixed;inset:0;background:rgba(17,24,39,.42);z-index:90;display:none}
    .drawer-mask.show,.modal-mask.show{display:block}
    .drawer{position:fixed;top:0;right:0;width:min(760px,100vw);height:100vh;background:#fff;box-shadow:-10px 0 30px rgba(0,0,0,.2);z-index:100;transform:translateX(100%);transition:transform .2s ease;display:flex;flex-direction:column}
    .drawer.show{transform:translateX(0)}
    .drawer-head,.drawer-foot{padding:12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
    .drawer-foot{border-bottom:none;border-top:1px solid var(--line)}
    .drawer-body{padding:12px;overflow:auto;display:grid;gap:10px}
    .group{border:1px solid var(--line);border-radius:10px;padding:10px}
    .group h4{margin:0 0 8px;font-size:14px}
    .perm-list{max-height:140px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:8px;display:grid;gap:6px}
    .perm-toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
    .perm-toolbar input{flex:1;min-width:180px;min-height:34px;border:1px solid #d1d5db;border-radius:8px;padding:6px 10px}
    .tag-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
    .modal{position:fixed;left:50%;top:12vh;transform:translateX(-50%);width:min(520px,92vw);background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 18px 40px rgba(0,0,0,.25);z-index:100;display:none}
    .modal.show{display:block}
    .modal-head,.modal-foot{padding:12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
    .modal-foot{border-bottom:none;border-top:1px solid var(--line)}
    .modal-body{padding:12px;display:grid;gap:10px}
    #toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;display:none;max-width:calc(100vw - 32px);background:#111827;color:#fff;padding:8px 12px;border-radius:10px;font-size:13px;box-shadow:0 10px 24px rgba(0,0,0,.22)}
    @media (max-width:1280px){
      :root{--left-w:240px;--right-w:300px}
      .filters{grid-template-columns:1fr 1fr 1fr 1fr auto auto auto}
    }
    @media (max-width:1024px){
      .mobile-tip{display:block}
      .container{display:none}
    }
  </style>
</head>
<body>
  <div class="mobile-tip">建议在电脑端使用管理后台。</div>
  <div class="container">
    <header class="topbar">
      <div>
        <h1>管理后台</h1>
        <p>员工与岗位权限工作台</p>
      </div>
      <div class="row">
        <button id="toDashboardBtn" class="btn btn-light">数据看板</button>
        <button id="logoutBtn" class="btn btn-primary">退出登录</button>
      </div>
    </header>

    <section class="layout">
      <aside class="card left">
        <div class="head">组织 / 门店</div>
        <div id="orgTree" class="tree-wrap"></div>
      </aside>

      <main class="card center">
        <div class="tabs">
          <button class="tab active" data-tab="staff">员工管理</button>
          <button class="tab" data-tab="position">岗位管理</button>
        </div>

        <section id="staffPanel" class="panel active">
          <div class="filters">
            <div class="field"><label for="filterKeyword">搜索账号</label><input id="filterKeyword" placeholder="输入账号关键词" /></div>
            <div class="field"><label for="filterPosition">岗位筛选</label><select id="filterPosition"><option value="">全部岗位</option><option value="admin">管理员</option><option value="manager">经理</option><option value="store_user">门店用户</option><option value="salesperson">销售员</option><option value="viewer">查看者</option><option value="disabled">停用</option></select></div>
            <div class="field"><label for="filterStatus">状态筛选</label><select id="filterStatus"><option value="">全部状态</option><option value="enabled">启用</option><option value="disabled">停用</option></select></div>
            <div class="field"><label for="filterScope">管理范围</label><select id="filterScope"><option value="">全部范围</option><option value="hq">总部</option><option value="limited">受限范围</option></select></div>
            <button id="queryUsersBtn" class="btn btn-light">查询</button>
            <button id="resetFiltersBtn" class="btn btn-light">重置</button>
            <button id="openCreateBtn" class="btn btn-primary">新增员工</button>
          </div>

          <div class="table-shell">
            <table>
              <thead>
                <tr>
                  <th class="sticky-left">账号</th>
                  <th>岗位</th>
                  <th>管理范围</th>
                  <th>门店权限</th>
                  <th>销售员权限</th>
                  <th>商品权限</th>
                  <th>Agent</th>
                  <th>会员隐私权限</th>
                  <th>钉钉绑定</th>
                  <th>DingTalk UserID</th>
                  <th class="sticky-right-2">状态</th>
                  <th>最后登录</th>
                  <th class="sticky-right">操作</th>
                </tr>
              </thead>
              <tbody id="usersTableBody">
                <tr><td colspan="13" class="muted">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <section id="positionPanel" class="panel">
          <div class="meta" style="margin-bottom:10px;">岗位默认权限由系统预设，后续支持自定义岗位模板。当前可在员工编辑中应用岗位默认权限。</div>
          <div id="positionGrid" class="role-grid"></div>
        </section>
      </main>

      <aside class="card right">
        <article class="side-card">
          <h3>数据导入</h3>
          <div class="field"><label for="adminImportFile">选择 Excel（可多选）</label><input id="adminImportFile" type="file" accept=".xls,.xlsx" multiple /></div>
          <div id="adminImportFileMeta" class="meta">已选择 0 个文件</div>
          <div id="adminImportFileList" class="meta"></div>
          <div class="row" style="margin-top:8px;"><button id="adminImportBtn" class="btn btn-primary">开始导入</button><span id="adminImportStatus" class="meta">待上传</span></div>
          <div id="latestImportMeta" class="meta" style="margin-top:8px;">最新数据更新时间：暂无</div>
        </article>
        <article class="side-card" id="notifConfigCard" hidden>
          <h3>钉钉通知配置</h3>
          <label class="muted" style="display:block;margin-bottom:8px;">
            <input id="dingtalkEnabledCheckbox" type="checkbox" /> 启用钉钉通知渠道
          </label>
          <div class="field">
            <label for="dingtalkTestUserIdInput">测试接收人（钉钉 UserID）</label>
            <input id="dingtalkTestUserIdInput" placeholder="例如：manager_001" />
          </div>
          <label class="muted" style="display:block;margin:8px 0 4px;">
            <input id="ruleDailySummaryCheckbox" type="checkbox" /> 日报提醒
          </label>
          <label class="muted" style="display:block;margin:0 0 4px;">
            <input id="ruleSleepingCheckbox" type="checkbox" /> 沉睡会员提醒
          </label>
          <label class="muted" style="display:block;margin:0 0 8px;">
            <input id="ruleSalespersonCheckbox" type="checkbox" /> 销售员业绩提醒
          </label>
          <div class="row">
            <button id="saveNotifConfigBtn" class="btn btn-light">保存配置</button>
            <button id="dingtalkTestBtn" class="btn btn-light">发送钉钉测试通知</button>
          </div>
          <div id="dingtalkEnvStatus" class="meta" style="margin-top:8px;">加载中...</div>
          <div id="dingtalkTestMsg" class="meta"></div>
        </article>
        <article class="side-card">
          <h3>导入历史</h3>
          <div id="importHistoryWrap" class="meta">加载中...</div>
        </article>
      </aside>
    </section>
  </div>

  <div id="drawerMask" class="drawer-mask"></div>
  <aside id="editDrawer" class="drawer" aria-hidden="true">
    <div class="drawer-head"><b>编辑员工</b><button id="closeDrawerBtn" class="btn btn-light">关闭</button></div>
    <div id="drawerBody" class="drawer-body"></div>
    <div class="drawer-foot">
      <span id="drawerMsg" class="meta"></span>
      <div class="row">
        <button id="drawerResetPwdBtn" class="btn btn-light">重置密码</button>
        <button id="drawerApplyRoleBtn" class="btn btn-light">应用岗位默认权限</button>
        <button id="drawerSaveBtn" class="btn btn-primary">保存</button>
      </div>
    </div>
  </aside>

  <div id="createModalMask" class="modal-mask"></div>
  <section id="createModal" class="modal" aria-hidden="true">
    <div class="modal-head"><b>新增员工</b><button id="closeCreateModalBtn" class="btn btn-light">关闭</button></div>
    <div class="modal-body">
      <div class="field"><label for="createUsername">账号</label><input id="createUsername" placeholder="例如：user_demo" /></div>
      <div class="field"><label for="createDisplayName">显示名称</label><input id="createDisplayName" placeholder="例如：门店经理A" /></div>
      <div class="field"><label for="createRole">岗位</label><select id="createRole"><option value="manager">经理</option><option value="store_user">门店用户</option><option value="salesperson">销售员</option><option value="viewer">查看者</option><option value="disabled">停用</option><option value="admin">管理员</option></select></div>
      <div class="field"><label for="createPassword">初始密码（至少8位）</label><input id="createPassword" type="password" /></div>
      <div id="createUserMsg" class="meta"></div>
    </div>
    <div class="modal-foot"><span class="meta">创建成功后自动刷新列表</span><button id="createUserBtn" class="btn btn-primary">创建员工</button></div>
  </section>

  <div id="positionModalMask" class="modal-mask"></div>
  <section id="positionModal" class="modal" aria-hidden="true">
    <div class="modal-head"><b id="positionModalTitle">岗位详情</b><button id="closePositionModalBtn" class="btn btn-light">关闭</button></div>
    <div id="positionModalBody" class="modal-body"></div>
    <div class="modal-foot"><span class="meta">当前为系统预设岗位</span><button id="positionModalSaveBtn" class="btn btn-light">暂不支持保存</button></div>
  </section>

  <div id="toast" role="status" aria-live="polite"></div>

  <script>
    const positionMap = { admin:"管理员", manager:"经理", store_user:"门店用户", salesperson:"销售员", viewer:"查看者", disabled:"停用" };
    const positionDesc = {
      admin: "系统最高权限岗位，默认全量范围。",
      manager: "适合店长/区域负责人，默认具备经营分析能力。",
      store_user: "门店运营岗位，聚焦门店分析与执行。",
      salesperson: "销售岗位，聚焦个人/团队销售表现。",
      viewer: "只读查看岗位，适合汇报查看。",
      disabled: "停用岗位，不可登录使用。",
    };
    const permissionGroups = {
      dashboard: ["canViewDashboard","canViewKpi","canViewStoreRanking","canViewSalespersonRanking","canViewProductRanking","canViewMemberAnalysis","canViewSleepingMembers","canViewTrendCharts","canViewRepurchaseAnalysis","canUseFilters","canExportData","canDownloadExcel","canViewRawRows","canViewDataQuality"],
      admin: ["canAccessAdmin","canManageUsers","canCreateUsers","canDisableUsers","canResetPasswords","canAssignRoles","canAssignDataScopes","canImportExcel","canDeleteImportedData","canViewImportHistory","canViewAuditLogs","canManageSystemSettings","canManageAgentSettings","canManageDingTalkSettings","canManageBackups"],
      agent: ["canUseAgentChat","canAskCompanyWideQuestions","canAskStoreQuestions","canAskSalespersonQuestions","canAskMemberQuestions","canAskSensitiveMemberQuestions","canAskForExport","canAskForRecommendations"],
      reminders: ["canReceiveDingTalkReminders","canReceiveMemberMaintenanceReminders","canReceiveStoreManagementReminders","canReceiveSalespersonPerformanceReminders","canReceiveSleepingMemberReminders","canManageReminderRules","canManageReminderRecipients"],
      memberFields: ["canViewMemberName","canViewPhone","canViewMemberId","canViewBirthday","canViewAddress"],
    };
    const permissionLabelMap = {
      canViewDashboard:"查看数据看板",canViewKpi:"查看 KPI",canViewStoreRanking:"查看门店排行",canViewSalespersonRanking:"查看销售员排行",canViewProductRanking:"查看商品排行",canViewMemberAnalysis:"查看会员分析",canViewSleepingMembers:"查看沉睡会员",canViewTrendCharts:"查看趋势图",canViewRepurchaseAnalysis:"查看复购分析",canUseFilters:"使用筛选器",canExportData:"导出数据",canDownloadExcel:"下载 Excel",canViewRawRows:"查看原始明细",canViewDataQuality:"查看数据校验",
      canAccessAdmin:"访问管理后台",canManageUsers:"管理员工",canCreateUsers:"新增员工",canDisableUsers:"停用员工",canResetPasswords:"重置密码",canAssignRoles:"分配岗位",canAssignDataScopes:"分配数据范围",canImportExcel:"导入 Excel",canDeleteImportedData:"删除导入数据",canViewImportHistory:"查看导入历史",canViewAuditLogs:"查看审计日志",canManageSystemSettings:"系统设置",canManageAgentSettings:"Agent 设置",canManageDingTalkSettings:"钉钉设置",canManageBackups:"备份设置",
      canUseAgentChat:"使用数据助手",canAskCompanyWideQuestions:"跨全公司提问",canAskStoreQuestions:"门店维度提问",canAskSalespersonQuestions:"销售员维度提问",canAskMemberQuestions:"会员维度提问",canAskSensitiveMemberQuestions:"敏感会员信息提问",canAskForExport:"要求导出",canAskForRecommendations:"经营建议问答",
      canReceiveDingTalkReminders:"接收钉钉提醒",canReceiveMemberMaintenanceReminders:"会员维护提醒",canReceiveStoreManagementReminders:"门店管理提醒",canReceiveSalespersonPerformanceReminders:"销售员业绩提醒",canReceiveSleepingMemberReminders:"沉睡会员提醒",canManageReminderRules:"管理提醒规则",canManageReminderRecipients:"管理提醒接收人",
      canViewMemberName:"会员姓名",canViewPhone:"手机号",canViewMemberId:"会员编号",canViewBirthday:"生日",canViewAddress:"地址",
    };

    let usersCache = [];
    let permissionOptions = { stores: [], salespeople: [], products: [] };
    let selectedTree = { type: "all", value: "" };
    let editingUserId = "";
    let currentUser = null;
    const permissionSearchState = {};
    let toastTimer = null;

    const splitCsv = (v) => String(v || "").split(",").map((x) => x.trim()).filter(Boolean);
    const uniq = (list) => [...new Set((Array.isArray(list) ? list : []).filter(Boolean))];
    const joinCsv = (list) => (Array.isArray(list) ? list : []).join(", ");
    const fmtTime = (v) => { if (!v) return "暂无"; const d = new Date(v); return Number.isNaN(d.getTime()) ? "暂无" : d.toLocaleString("zh-CN"); };

    function showToast(message, type = "info") {
      const toast = document.getElementById("toast");
      toast.textContent = message || "";
      toast.style.background = type === "error" ? "#b91c1c" : (type === "success" ? "#166534" : "#111827");
      toast.style.display = "block";
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.style.display = "none"; }, 2300);
    }
    function setButtonLoading(button, isLoading, loadingText) {
      if (!button) return;
      if (!button.dataset.originText) button.dataset.originText = button.textContent || "";
      button.disabled = !!isLoading;
      button.textContent = isLoading ? (loadingText || "处理中...") : button.dataset.originText;
    }
    async function withLoading(button, loadingText, fn) {
      setButtonLoading(button, true, loadingText);
      try { return await fn(); } finally { setButtonLoading(button, false); }
    }

    function summarizeScope(u) {
      if (u.allowAllStores && u.allowAllSalespeople && u.allowAllProducts) return "总部";
      if (u.allowAllStores) return "全门店";
      return "受限范围";
    }
    function summarizeCount(allowAll, list, unit) { return allowAll ? "全部" : `${(Array.isArray(list) ? list.length : 0)}${unit}`; }
    function summarizePrivacy(fields = {}) {
      const labels = [];
      if (fields.canViewMemberName) labels.push("会员姓名");
      if (fields.canViewPhone) labels.push("手机号");
      if (fields.canViewMemberId) labels.push("会员编号");
      if (fields.canViewBirthday) labels.push("生日");
      if (fields.canViewAddress) labels.push("地址");
      return labels.length ? labels.join("、") : "未开启";
    }
    function hasAgentEnabled(u) { return !!u?.permissions?.canUseAgentChat; }
    function userVisibleInTree(u) {
      if (selectedTree.type === "all") return true;
      if (selectedTree.type === "hq") return !!u.allowAllStores;
      if (selectedTree.type === "allStores") return true;
      if (selectedTree.type === "store") {
        const store = selectedTree.value;
        return !!u.allowAllStores || (Array.isArray(u.allowedStores) && u.allowedStores.includes(store));
      }
      return true;
    }
    function applyFilters(rows) {
      const keyword = String(document.getElementById("filterKeyword").value || "").trim().toLowerCase();
      const role = document.getElementById("filterPosition").value;
      const status = document.getElementById("filterStatus").value;
      const scope = document.getElementById("filterScope").value;
      return rows.filter((u) => {
        if (!userVisibleInTree(u)) return false;
        if (keyword && !String(u.username || "").toLowerCase().includes(keyword)) return false;
        if (role && String(u.role || "") !== role) return false;
        if (status === "enabled" && !u.enabled) return false;

        if (scope === "hq" && !u.allowAllStores) return false;
        if (scope === "limited" && !!u.allowAllStores) return false;
        return true;
      });
    }

    async function uploadImportFile() {
      const files = [...(document.getElementById("adminImportFile").files || [])];
      const status = document.getElementById("adminImportStatus");
      if (!files.length) { status.className = "meta err"; status.textContent = "请先选择文件"; showToast("请先选择文件","error"); return; }
      function summarizeImportFailure(job, fallback) {
        const parts = [];
        if (job?.error) parts.push(String(job.error));
        const failedFiles = Array.isArray(job?.stats?.failedFiles) ? job.stats.failedFiles : [];
        if (failedFiles.length) {
          const fileReason = failedFiles
            .slice(0, 3)
            .map((f) => `${f.fileName || "文件"}：${f.reason || "导入失败"}`)
            .join("；");
          if (fileReason) parts.push(fileReason);
        }
        const warnings = Array.isArray(job?.warnings) ? job.warnings.filter(Boolean) : [];
        if (warnings.length) parts.push(`明细：${warnings.slice(0, 3).join("；")}`);
        if (!parts.length) return fallback || "导入失败";
        const text = parts.join("｜");
        return text.length > 320 ? `${text.slice(0, 320)}...` : text;
      }
      status.className = "meta";
      status.textContent = `上传中（${files.length} 个文件）...`;
      try {
        const form = new FormData();
        files.forEach((f) => form.append("files", f));
        form.append("mapping", JSON.stringify({}));
        const uploadRes = await fetch("/api/v2/uploads", { method: "POST", body: form });
        const uploadRaw = await uploadRes.text().catch(() => "");
        let uploadData = {};
        try { uploadData = uploadRaw ? JSON.parse(uploadRaw) : {}; } catch (_e) { uploadData = {}; }
        if (!uploadRes.ok) {
          const rawSummary = String(uploadRaw || "")
            .replace(/<[^>]*>/g, " ")
            .replace(/\s+/g, " ")
            .trim()
            .slice(0, 180);
          const msg = uploadData.error || rawSummary || `上传失败（${uploadRes.status}）`;
          status.className = "meta err";
          status.textContent = msg;
          showToast(msg, "error");
          return;
        }
        const jobId = uploadData.jobId;
        for (let i = 0; i < 300; i += 1) {
          const jobRes = await fetch(`/api/v2/jobs/${encodeURIComponent(jobId)}`);
          const jobRaw = await jobRes.text().catch(() => "");
          let jobData = {};
          try { jobData = jobRaw ? JSON.parse(jobRaw) : {}; } catch (_e) { jobData = {}; }
          if (!jobRes.ok) {
            const rawSummary = String(jobRaw || "")
              .replace(/<[^>]*>/g, " ")
              .replace(/\s+/g, " ")
              .trim()
              .slice(0, 180);
            const msg = (jobData && jobData.error) || rawSummary || `任务状态查询失败（${jobRes.status}）`;
            status.className = "meta err";
            status.textContent = msg;
            showToast(msg, "error");
            return;
          }
          const job = jobData.job || {};
          const p = job?.stats?.importProgress || {};
          const idx = Number(p.currentFileIndex || 0);
          const total = Number(p.fileCount || files.length);
          const name = String(p.currentFileName || "");
          const rows = Number(p.cumulativeRowCount || 0);
          const okFiles = Number(p.successfulFileCount || 0);
          const failedFiles = Number(p.failedFileCount || 0);
          const dupRows = Number(p.duplicateRowsSkipped || 0);
          status.textContent =
            `导入状态：${job.status || "running"}（${job.progress || 0}%）｜第 ${Math.min(idx,total)}/${total} 个｜${name || "处理中"}｜累计 ${rows} 行｜成功 ${okFiles}｜失败 ${failedFiles}｜去重 ${dupRows}`;
          if (job.status === "completed") {
            const okFiles = job?.stats?.successfulFiles || [];
            const failFiles = job?.stats?.failedFiles || [];
            if (failFiles.length) {
              status.className = "meta err";
              const detail = summarizeImportFailure(job, "部分文件导入失败");
              status.textContent = `导入完成：成功 ${okFiles.length}，失败 ${failFiles.length}，累计 ${Number(job?.stats?.rowCount || 0)} 行。${detail}`;
              showToast(`导入完成，但有 ${failFiles.length} 个文件失败`, "error");
            } else {
              status.className = "meta ok";
              status.textContent = `导入完成：成功 ${okFiles.length}，失败 ${failFiles.length}，累计 ${Number(job?.stats?.rowCount || 0)} 行`;
              showToast("导入完成","success");
            }
            await Promise.all([refreshLatestImportMeta(), loadImportHistory(), loadPermissionOptions()]);
            return;
          }
          if (job.status === "failed") {
            status.className = "meta err";
            const detail = summarizeImportFailure(job, "导入失败");
            status.textContent = detail;
            showToast(detail, "error");
            await loadImportHistory();
            return;
          }
          await new Promise((r) => setTimeout(r, 1200));
        }
      } catch (error) {
        status.className = "meta err";
        const msg = error?.message || "网络异常，上传失败";
        status.textContent = msg;
        showToast(msg, "error");
        return;
      }
      status.className = "meta err";
      status.textContent = "导入超时，请稍后查看导入历史";
      showToast(status.textContent, "error");
    }

    async function applyPositionDefaultsForEditingUser() {
      if (!editingUserId) return;
      if (!requireAdminAction("应用岗位默认权限")) return;
      const role = document.querySelector("[data-edit-field='role']")?.value || "";
      const msg = document.getElementById("drawerMsg");
      msg.className = "meta";
      msg.textContent = "应用中...";
      const res = await fetch(`/api/admin/users/${encodeURIComponent(editingUserId)}`, { method:"PATCH", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ role, applyRoleDefaults: true }) });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { msg.className = "meta err"; msg.textContent = data.error || "应用失败"; showToast(msg.textContent, "error"); return; }
      showToast("已应用岗位默认权限", "success");
      await loadUsers();
      openDrawerForUser(editingUserId);
    }
    async function resetPassword(userId) {
      if (!requireAdminAction("重置密码")) return;
      const password = window.prompt("请输入新密码（至少8位）：");
      if (!password) return;
      const res = await fetch(`/api/admin/users/${encodeURIComponent(userId)}/reset-password`, { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ password }) });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { showToast(data.error || "重置失败", "error"); return; }
      showToast("密码重置成功", "success");
    }
    async function toggleUser(userId) {
      if (!requireAdminAction("启停账号")) return;
      const u = usersCache.find((x) => String(x.id) === String(userId));
      if (!u) return;
      const res = await fetch(`/api/admin/users/${encodeURIComponent(userId)}`, { method:"PATCH", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ enabled: !u.enabled }) });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { showToast(data.error || "操作失败", "error"); return; }
      showToast(!u.enabled ? "员工已启用":"员工已停用", "success");
      await loadUsers();
    }

    async function createUser() {
      if (!requireAdminAction("新增员工")) return;
      const msg = document.getElementById("createUserMsg");
      msg.className = "meta";
      msg.textContent = "提交中...";
      const payload = {
        username: document.getElementById("createUsername").value.trim(),
        displayName: document.getElementById("createDisplayName").value.trim(),
        role: document.getElementById("createRole").value,
        password: document.getElementById("createPassword").value,
      };
      const res = await fetch("/api/admin/users", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(payload) });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { msg.className = "meta err"; msg.textContent = data.error || "创建失败"; showToast(msg.textContent, "error"); return; }
      msg.className = "meta ok";
      msg.textContent = "创建成功";
      showToast("新增员工成功", "success");
      ["createUsername","createDisplayName","createPassword"].forEach((id) => { document.getElementById(id).value = ""; });
      await loadUsers();
      closeCreateModal();
    }
    function openCreateModal() {
      document.getElementById("createModalMask").classList.add("show");
      document.getElementById("createModal").classList.add("show");
      document.getElementById("createUserMsg").textContent = "";
    }
    function closeCreateModal() {
      document.getElementById("createModalMask").classList.remove("show");
      document.getElementById("createModal").classList.remove("show");
    }

    function openPositionModal(role) {
      const title = document.getElementById("positionModalTitle");
      const body = document.getElementById("positionModalBody");
      title.textContent = `${positionMap[role] || role} - 岗位默认权限`;
      const sample = getPositionSummaryFromUsers(role);
      const p = sample?.permissions || {};
      const mf = sample?.allowedMemberFields || {};
      body.innerHTML = `
        <div class="meta">岗位说明：${positionDesc[role] || "系统预设岗位"}</div>
        <div class="group"><h4>默认看板权限</h4><div class="perm-list">${renderPermissionFlagsCheckboxes(`position-${role}`, "dashboard", p).replace(/type="checkbox"/g,'type="checkbox" disabled')}</div></div>
        <div class="group"><h4>默认管理权限</h4><div class="perm-list">${renderPermissionFlagsCheckboxes(`position-${role}`, "admin", p).replace(/type="checkbox"/g,'type="checkbox" disabled')}</div></div>
        <div class="group"><h4>默认 Agent 权限</h4><div class="perm-list">${renderPermissionFlagsCheckboxes(`position-${role}`, "agent", p).replace(/type="checkbox"/g,'type="checkbox" disabled')}</div></div>
        <div class="group"><h4>默认钉钉提醒权限</h4><div class="perm-list">${renderPermissionFlagsCheckboxes(`position-${role}`, "reminders", p).replace(/type="checkbox"/g,'type="checkbox" disabled')}</div></div>
        <div class="group"><h4>默认会员隐私权限</h4><div class="perm-list">${renderPermissionFlagsCheckboxes(`position-${role}`, "memberFields", mf).replace(/type="checkbox"/g,'type="checkbox" disabled')}</div></div>
      `;
      document.getElementById("positionModalMask").classList.add("show");
      document.getElementById("positionModal").classList.add("show");
    }
    function closePositionModal() {
      document.getElementById("positionModalMask").classList.remove("show");
      document.getElementById("positionModal").classList.remove("show");
    }

    async function sendDingTalkTestNotification() {
      const msgEl = document.getElementById("dingtalkTestMsg");
      msgEl.textContent = "";
      const testUserId = String(document.getElementById("dingtalkTestUserIdInput")?.value || "").trim();
      const res = await fetch("/api/v2/admin/notifications/test-dingtalk", {
        method:"POST",
        credentials:"same-origin",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ testUserId }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok && data.ok !== false) {
        const code = Number(data?.dingtalk?.errcode ?? 0);
        const errmsg = String(data?.dingtalk?.errmsg || "ok");
        msgEl.textContent = `发送成功（errcode=${code}, errmsg=${errmsg}）`;
        msgEl.className = "meta ok";
        showToast("已发送钉钉测试通知","success");
        return;
      }
      msgEl.textContent = data.error || `请求失败（${res.status}）`;
      msgEl.className = "meta err";
      showToast(msgEl.textContent,"error");
    }

    function applyNotificationConfig(config, envStatus) {
      const cfg = config || {};
      document.getElementById("dingtalkEnabledCheckbox").checked = cfg?.channels?.dingtalkEnabled !== false;
      document.getElementById("dingtalkTestUserIdInput").value = String(cfg?.recipients?.dingtalkTestUserId || "");
      document.getElementById("ruleDailySummaryCheckbox").checked = !!cfg?.rules?.dailySummaryEnabled;
      document.getElementById("ruleSleepingCheckbox").checked = !!cfg?.rules?.sleepingMemberAlertEnabled;
      document.getElementById("ruleSalespersonCheckbox").checked = !!cfg?.rules?.salespersonAlertEnabled;
      const envEl = document.getElementById("dingtalkEnvStatus");
      if (!envEl) return;
      const status = envStatus || {};
      envEl.className = "meta";
      envEl.textContent =
        `环境检查：CorpId ${status.corpIdConfigured ? "已配置" : "未配置"} / AppKey ${status.appKeyConfigured ? "已配置" : "未配置"} / AppSecret ${status.appSecretConfigured ? "已配置" : "未配置"} / AgentId ${status.agentIdConfigured ? "已配置" : "未配置"}`;
    }

    async function loadNotificationConfig() {
      const res = await fetch("/api/v2/admin/notifications/config", { credentials: "same-origin" });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        showToast(data.error || "通知配置加载失败", "error");
        return;
      }
      applyNotificationConfig(data.config, data.envStatus);
    }

    async function saveNotificationConfig() {
      const payload = {
        config: {
          channels: {
            dingtalkEnabled: !!document.getElementById("dingtalkEnabledCheckbox").checked,
          },
          rules: {
            dailySummaryEnabled: !!document.getElementById("ruleDailySummaryCheckbox").checked,
            sleepingMemberAlertEnabled: !!document.getElementById("ruleSleepingCheckbox").checked,
            salespersonAlertEnabled: !!document.getElementById("ruleSalespersonCheckbox").checked,
          },
          recipients: {
            dingtalkTestUserId: String(document.getElementById("dingtalkTestUserIdInput").value || "").trim(),
          },
        },
      };
      const res = await fetch("/api/v2/admin/notifications/config", {
        method: "PUT",
        credentials: "same-origin",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify(payload),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        showToast(data.error || "通知配置保存失败", "error");
        return;
      }
      applyNotificationConfig(data.config);
      showToast("通知配置已保存", "success");
    }

    document.getElementById("toDashboardBtn").addEventListener("click", () => { window.location.href = "/dashboard"; });
    document.getElementById("logoutBtn").addEventListener("click", async () => { await fetch("/api/auth/logout", { method:"POST" }); window.location.href = "/login"; });
    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        const name = tab.getAttribute("data-tab");
        document.querySelectorAll(".tab").forEach((t) => t.classList.toggle("active", t === tab));
        document.getElementById("staffPanel").classList.toggle("active", name === "staff");
        document.getElementById("positionPanel").classList.toggle("active", name === "position");
      });
    });
    document.getElementById("queryUsersBtn").addEventListener("click", renderUsersTable);
    document.getElementById("resetFiltersBtn").addEventListener("click", () => {
      ["filterKeyword","filterPosition","filterStatus","filterScope"].forEach((id) => { document.getElementById(id).value = ""; });
      selectedTree = { type: "all", value: "" };
      renderOrgTree();
      renderUsersTable();
    });
    document.getElementById("openCreateBtn").addEventListener("click", function () {
      if (!requireAdminAction("新增员工")) return;
      openCreateModal();
    });
    document.getElementById("closeCreateModalBtn").addEventListener("click", closeCreateModal);
    document.getElementById("createModalMask").addEventListener("click", closeCreateModal);
    document.getElementById("createUserBtn").addEventListener("click", (e) => withLoading(e.currentTarget, "创建中...", createUser));

    document.getElementById("orgTree").addEventListener("click", (event) => {
      const node = event.target.closest("[data-tree-type]");
      if (!node) return;
      selectedTree = { type: node.getAttribute("data-tree-type"), value: node.getAttribute("data-tree-value") || "" };
      renderOrgTree();
      renderUsersTable();
    });
    document.getElementById("usersTableBody").addEventListener("click", async (event) => {
      const btn = event.target.closest("[data-action]");
      if (!btn) return;
      const userId = btn.getAttribute("data-id");
      const action = btn.getAttribute("data-action");
      if (!userId) return;
      if (action === "edit") return openDrawerForUser(userId);
      if (action === "toggle") return withLoading(btn, "处理中...", async () => { await toggleUser(userId); });
      if (action === "reset") return withLoading(btn, "重置中...", async () => { await resetPassword(userId); });
    });

    document.getElementById("positionGrid").addEventListener("click", (event) => {
      const btn = event.target.closest("[data-action='view-position']");
      if (!btn) return;
      openPositionModal(btn.getAttribute("data-role") || "");
    });
    document.getElementById("positionModalMask").addEventListener("click", closePositionModal);
    document.getElementById("closePositionModalBtn").addEventListener("click", closePositionModal);
    document.getElementById("positionModalSaveBtn").addEventListener("click", () => showToast("当前为系统预设岗位，暂不支持直接保存。", "info"));

    document.getElementById("drawerMask").addEventListener("click", closeDrawer);
    document.getElementById("closeDrawerBtn").addEventListener("click", closeDrawer);
    document.getElementById("drawerSaveBtn").addEventListener("click", (e) => withLoading(e.currentTarget, "保存中...", saveEditingUser));
    document.getElementById("drawerApplyRoleBtn").addEventListener("click", (e) => withLoading(e.currentTarget, "应用中...", applyPositionDefaultsForEditingUser));
    document.getElementById("drawerResetPwdBtn").addEventListener("click", (e) => withLoading(e.currentTarget, "重置中...", async () => { if (editingUserId) await resetPassword(editingUserId); }));
    document.getElementById("drawerBody").addEventListener("click", (event) => {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const userId = target.getAttribute("data-id");
      const kind = target.getAttribute("data-kind");
      if (!userId || !kind) return;
      if (target.getAttribute("data-action") === "perm-all") applyPermissionBulkAction(kind, userId, "all");
      if (target.getAttribute("data-action") === "perm-clear") applyPermissionBulkAction(kind, userId, "clear");
    });
    document.getElementById("drawerBody").addEventListener("input", (event) => {
      const searchInput = event.target.closest("[data-search-kind]");
      if (searchInput) {
        const userId = searchInput.getAttribute("data-id");
        const kind = searchInput.getAttribute("data-search-kind");
        if (!userId || !kind) return;
        setPermissionSearchValue(kind, userId, searchInput.value || "");
        renderPermissionPanel(kind, userId);
        return;
      }
      const input = event.target.closest("[data-fallback]");
      if (!input) return;
      const userId = input.getAttribute("data-id");
      const kind = input.getAttribute("data-fallback");
      if (!userId || !kind) return;
      const selected = collectPermissionValues(kind, userId);
      renderTagList(`tags-${kind}-${userId}`, selected);
      renderSelectedCount(kind, userId, selected);
    });
    document.getElementById("drawerBody").addEventListener("change", (event) => {
      const cb = event.target.closest('input[type="checkbox"][data-kind]');
      if (!cb) return;
      const userId = cb.getAttribute("data-id");
      const kind = cb.getAttribute("data-kind");
      if (!userId || !kind) return;
      const selected = collectPermissionValues(kind, userId);
      renderTagList(`tags-${kind}-${userId}`, selected);
      renderSelectedCount(kind, userId, selected);
    });

    document.getElementById("adminImportBtn").addEventListener("click", (event) => withLoading(event.currentTarget, "导入中...", uploadImportFile));
    document.getElementById("adminImportFile").addEventListener("change", renderImportFileSelection);
    document.getElementById("saveNotifConfigBtn")?.addEventListener("click", (event) => withLoading(event.currentTarget, "保存中...", saveNotificationConfig));
    document.getElementById("dingtalkTestBtn")?.addEventListener("click", (event) => withLoading(event.currentTarget, "发送中...", sendDingTalkTestNotification));

    (async () => {
      const meRes = await fetch("/api/auth/me");
      if (!meRes.ok) { window.location.href = "/login"; return; }
      const meJson = await meRes.json().catch(() => ({}));
      currentUser = meJson?.user || null;
      if (!isAdminOperator()) {
        const createBtn = document.getElementById("openCreateBtn");
        const resetBtn = document.getElementById("drawerResetPwdBtn");
        const applyRoleBtn = document.getElementById("drawerApplyRoleBtn");
        if (createBtn) createBtn.disabled = true;
        if (resetBtn) resetBtn.disabled = true;
        if (applyRoleBtn) applyRoleBtn.disabled = true;
      }
      if (meJson?.user?.role === "admin") {
        document.getElementById("notifConfigCard").removeAttribute("hidden");
        await loadNotificationConfig();
      }
      await loadPermissionOptions();
      await loadUsers();
      await Promise.all([refreshLatestImportMeta(), loadImportHistory()]);
    })();
  </script>
</body>
</html>
