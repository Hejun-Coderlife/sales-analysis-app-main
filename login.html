<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Analysis Login</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:radial-gradient(1200px 700px at 15% -10%, rgba(59,130,246,.25), transparent), #f3f6fb;
      color:#111827;
    }
    .card{
      width:min(420px,92vw);
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:14px;
      box-shadow:0 20px 50px rgba(2,6,23,.12);
      padding:24px;
    }
    h1{ margin:0 0 10px; font-size:22px; }
    p{ margin:0 0 16px; color:#4b5563; font-size:14px; }
    label{ display:block; margin:12px 0 6px; font-size:13px; color:#374151; }
    input{
      width:100%;
      box-sizing:border-box;
      min-height:42px;
      border-radius:10px;
      border:1px solid #d1d5db;
      padding:10px 12px;
      font-size:14px;
      outline:none;
    }
    input:focus{ border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.16); }
    button{
      margin-top:16px;
      width:100%;
      min-height:42px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:#fff;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
    }
    .meta{ margin-top:10px; font-size:12px; color:#6b7280; }
    .error{ margin-top:10px; color:#b91c1c; font-size:13px; min-height:18px; }
    .ok{ color:#166534; }
  </style>
</head>
<body>
  <section class="card">
    <h1>Sales Analysis Login</h1>
    <p>Sign in to access dashboard or admin console.</p>
    <form id="loginForm">
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />
      <button id="submitBtn" type="submit">Login</button>
      <div id="message" class="error"></div>
    </form>
    <div class="meta">Default admin account: <b>admin</b> / <b>Admin@123456</b> (change in production).</div>
  </section>
  <script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('message');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      msg.textContent = '';
      btn.disabled = true;
      const body = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      };
      try {
        const response = await fetch('/api/auth/login', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(body),
        });
        const data = await response.json();
        if (!response.ok) {
          msg.textContent = data.error || 'Login failed';
          return;
        }
        msg.textContent = 'Login successful. Redirecting...';
        msg.classList.add('ok');
        window.location.href = data.user?.role === 'admin' ? '/admin' : '/dashboard';
      } catch (error) {
        msg.textContent = error?.message || 'Network error';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
