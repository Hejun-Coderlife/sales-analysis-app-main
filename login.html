<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>赫眉经营助手 - 登录</title>
  <link rel="stylesheet" href="/frontend/src/styles/galaxy-background.css" />
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:#02030f;
      color:#111827;
      position:relative;
      overflow-x:hidden;
      padding:16px;
      box-sizing:border-box;
    }
    .login-layout{
      width:100%;
      max-width:900px;
      min-height:calc(100vh - 32px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:22px;
      margin:0 auto;
      position:relative;
      z-index:1;
      box-sizing:border-box;
    }
    .card{
      width:min(420px,92vw);
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:14px;
      box-shadow:0 20px 50px rgba(2,6,23,.12);
      padding:24px;
      position:relative;
      z-index:2;
    }
    .earth-section{
      width:100%;
      margin:0;
      padding:0;
      display:flex !important;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      position:static !important;
      inset:auto !important;
      transform:none !important;
      pointer-events:none;
      z-index:1;
      box-sizing:border-box;
    }
    .earth-stage{
      width:clamp(280px, 36vw, 420px);
      height:clamp(280px, 36vw, 420px);
      max-width:420px;
      max-height:420px;
      margin:0 auto;
    }
    #earth-canvas{
      width:100%;
      height:100%;
      display:block;
    }
    .earth-caption{
      margin-top:10px;
      text-align:center;
      color:#cbd5e1;
      letter-spacing:.14em;
      font-size:11px;
      text-transform:uppercase;
    }
    h1{ margin:0 0 10px; font-size:22px; }
    p{ margin:0 0 16px; color:#4b5563; font-size:14px; }
    label{ display:block; margin:12px 0 6px; font-size:13px; color:#374151; }
    input{
      width:100%;
      box-sizing:border-box;
      min-height:42px;
      border-radius:10px;
      border:1px solid #d1d5db;
      padding:10px 12px;
      font-size:14px;
      outline:none;
    }
    input:focus{ border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.16); }
    button{
      margin-top:16px;
      width:100%;
      min-height:42px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:#fff;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
    }
    .meta{ margin-top:10px; font-size:12px; color:#6b7280; }
    .error{ margin-top:10px; color:#b91c1c; font-size:13px; min-height:18px; }
    .ok{ color:#166534; }
    #toast{
      position:fixed;
      top:16px;
      left:50%;
      transform:translateX(-50%);
      z-index:9999;
      background:#111827;
      color:#fff;
      padding:8px 12px;
      border-radius:10px;
      font-size:13px;
      box-shadow:0 10px 24px rgba(0,0,0,.25);
      display:none;
    }
    #submitBtn[disabled]{ opacity:.72; cursor:not-allowed; }
    @media (max-width: 800px) {
      body{
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:flex-start;
        min-height:100vh;
        padding:20px 12px 18px;
        gap:0;
        overflow-x:hidden;
      }
      .login-layout{
        min-height:auto;
        max-width:100%;
        justify-content:flex-start;
        gap:14px;
      }
      .card{
        width:min(86vw, 340px);
        max-width:340px;
        margin:0 auto;
        padding:16px;
        border-radius:12px;
      }
      h1{
        font-size:20px;
        margin-bottom:8px;
      }
      p{
        font-size:13px;
        margin-bottom:14px;
      }
      input{
        min-height:40px;
      }
      button{
        min-height:40px;
      }
      .meta{
        line-height:1.45;
        overflow-wrap:anywhere;
      }
      .earth-section{
        width:100%;
        margin:0;
        padding:10px 0 8px;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
      }
      .earth-stage{
        width:clamp(220px, 58vw, 280px);
        height:clamp(220px, 58vw, 280px);
        max-width:280px;
        max-height:280px;
      }
      #earth-canvas{
        width:100%;
        height:100%;
      }
      .earth-caption{
        margin-top:10px;
        letter-spacing:0.16em;
      }
    }
  </style>
</head>
<body>
  <main class="login-layout">
    <section class="card">
      <h1>赫眉经营助手</h1>
      <p>登录后可访问数据看板与管理后台。</p>
      <form id="loginForm">
        <label for="username">账号</label>
        <input id="username" name="username" autocomplete="username" required />
        <label for="password">密码</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
        <button id="submitBtn" type="submit">登录</button>
        <div id="message" class="error"></div>
      </form>
      <div class="meta">默认管理员账号：<b>admin</b> / <b>Admin@123456</b>（上线前请立即修改）。</div>
    </section>
  </main>
  <div id="toast" role="status" aria-live="polite"></div>
  <script src="/frontend/src/visual/galaxy-background.js"></script>
  <script>
    window.initGalaxyBackground({ includeEarth: true, mapAssistantButton: false });
    function syncLoginEarthLayout() {
      var layout = document.querySelector('.login-layout');
      var earthSection = document.querySelector('.earth-section');
      if (!layout || !earthSection) return false;
      if (earthSection.parentElement !== layout) layout.appendChild(earthSection);
      var caption = earthSection.querySelector('.earth-caption');
      if (caption) {
        caption.innerHTML = 'GLOBAL BUSINESS NETWORK<span class="earth-hint">DRAG TO ROTATE · SCROLL TO ZOOM</span>';
      }
      return true;
    }
    if (!syncLoginEarthLayout()) {
      var observer = new MutationObserver(function () {
        if (syncLoginEarthLayout()) observer.disconnect();
      });
      observer.observe(document.body, { childList: true, subtree: true });
      setTimeout(function () { observer.disconnect(); }, 3000);
    }
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('message');
    const btnText = btn.textContent;
    let toastTimer = null;
    function showToast(text, type = 'info'){
      const toast = document.getElementById('toast');
      if (!toast) return;
      toast.textContent = text;
      toast.style.background = type === 'error' ? '#b91c1c' : (type === 'success' ? '#166534' : '#111827');
      toast.style.display = 'block';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.style.display = 'none'; }, 2200);
    }
    function setButtonLoading(isLoading){
      btn.disabled = !!isLoading;
      btn.textContent = isLoading ? '登录中...' : btnText;
    }
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      msg.textContent = '';
      msg.classList.remove('ok');
      setButtonLoading(true);
      const body = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      };
      try {
        const response = await fetch('/api/auth/login', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(body),
        });
        const data = await response.json();
        if (!response.ok) {
          msg.textContent = data.error || '登录失败';
          showToast(msg.textContent, 'error');
          return;
        }
        msg.textContent = '登录成功，正在跳转...';
        msg.classList.add('ok');
        showToast('登录成功', 'success');
        const params = new URLSearchParams(window.location.search);
        const nextRaw = params.get('next') || '';
        const allowed = new Set(["/dashboard", "/admin", "/mobile", "/mobile.html", "/index.html"]);
        const nextPath = (() => {
          const p = String(nextRaw || '').split('?')[0].split('#')[0];
          return allowed.has(p) ? p : '';
        })();
        if (nextPath) {
          window.location.href = nextPath;
        } else if (data.user?.role === 'admin') {
          window.location.href = '/admin';
        } else {
          window.location.href = '/dashboard';
        }
      } catch (error) {
        msg.textContent = error?.message || '网络异常，请稍后重试';
        showToast(msg.textContent, 'error');
      } finally {
        setButtonLoading(false);
      }
    });
  </script>
</body>
</html>
