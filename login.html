<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>销售数据分析系统 - 登录</title>
  <link rel="stylesheet" href="/frontend/src/styles/galaxy-background.css" />
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:#02030f;
      color:#111827;
      position:relative;
      overflow-x:hidden;
      padding:16px;
      box-sizing:border-box;
    }
    .card{
      width:min(420px,92vw);
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:14px;
      box-shadow:0 20px 50px rgba(2,6,23,.12);
      padding:24px;
      position:relative;
      z-index:1;
    }
    h1{ margin:0 0 10px; font-size:22px; }
    p{ margin:0 0 16px; color:#4b5563; font-size:14px; }
    label{ display:block; margin:12px 0 6px; font-size:13px; color:#374151; }
    input{
      width:100%;
      box-sizing:border-box;
      min-height:42px;
      border-radius:10px;
      border:1px solid #d1d5db;
      padding:10px 12px;
      font-size:14px;
      outline:none;
    }
    input:focus{ border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.16); }
    button{
      margin-top:16px;
      width:100%;
      min-height:42px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:#fff;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
    }
    .meta{ margin-top:10px; font-size:12px; color:#6b7280; }
    .error{ margin-top:10px; color:#b91c1c; font-size:13px; min-height:18px; }
    .ok{ color:#166534; }
    @media (max-width: 800px) {
      body{
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:flex-start;
        min-height:100vh;
        padding:20px 12px 18px;
        gap:0;
        overflow-x:hidden;
      }
      .card{
        width:min(92vw, 380px);
        max-width:380px;
        margin:0;
        padding:20px;
        border-radius:12px;
      }
      h1{
        font-size:20px;
        margin-bottom:8px;
      }
      p{
        font-size:13px;
        margin-bottom:14px;
      }
      input{
        min-height:40px;
      }
      button{
        min-height:40px;
      }
      .meta{
        line-height:1.45;
        overflow-wrap:anywhere;
      }
      .earth-section{
        width:100%;
        margin:14px 0 0;
        padding:10px 0 8px;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
      }
      .earth-stage{
        width:clamp(220px, 58vw, 280px);
        height:clamp(220px, 58vw, 280px);
        max-width:280px;
        max-height:280px;
      }
      #earth-canvas{
        width:100%;
        height:100%;
      }
      .earth-caption{
        margin-top:10px;
        letter-spacing:0.16em;
      }
    }
  </style>
</head>
<body>
  <section class="card">
    <h1>销售数据分析系统</h1>
    <p>登录后可访问数据看板与管理后台。</p>
    <form id="loginForm">
      <label for="username">账号</label>
      <input id="username" name="username" autocomplete="username" required />
      <label for="password">密码</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />
      <button id="submitBtn" type="submit">登录</button>
      <div id="message" class="error"></div>
    </form>
    <div class="meta">默认管理员账号：<b>admin</b> / <b>Admin@123456</b>（上线前请立即修改）。</div>
  </section>
  <script src="/frontend/src/visual/galaxy-background.js"></script>
  <script>
    window.initGalaxyBackground({ includeEarth: true, mapAssistantButton: false });
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('message');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      msg.textContent = '';
      btn.disabled = true;
      const body = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      };
      try {
        const response = await fetch('/api/auth/login', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(body),
        });
        const data = await response.json();
        if (!response.ok) {
          msg.textContent = data.error || '登录失败';
          return;
        }
        msg.textContent = '登录成功，正在跳转...';
        msg.classList.add('ok');
        const params = new URLSearchParams(window.location.search);
        const nextRaw = params.get('next') || '';
        const allowed = new Set(["/dashboard", "/admin", "/mobile", "/mobile.html", "/index.html"]);
        const nextPath = (() => {
          const p = String(nextRaw || '').split('?')[0].split('#')[0];
          return allowed.has(p) ? p : '';
        })();
        if (nextPath) {
          window.location.href = nextPath;
        } else if (data.user?.role === 'admin') {
          window.location.href = '/admin';
        } else {
          window.location.href = '/dashboard';
        }
      } catch (error) {
        msg.textContent = error?.message || '网络异常，请稍后重试';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
