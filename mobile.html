<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>赫眉经营助手 - 数据看板（手机版）</title>
  <link rel="stylesheet" href="/frontend/src/styles/galaxy-background.css" />
  <style>
    :root {
      --bg: #02030f;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 12px 14px 96px;
      padding-bottom: calc(96px + var(--safe-bottom));
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow-x: hidden;
    }
    header.top {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }
    h1 { margin: 0; font-size: 1.15rem; font-weight: 700; color: #f8fbff; text-shadow: 0 0 18px rgba(105,105,159,.35), 0 2px 10px rgba(0,0,0,.35); }
    .sub { margin: 4px 0 0; font-size: 12px; color: #d7def2; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .btn {
      border: none;
      border-radius: 10px;
      min-height: 38px;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-light { background: #e5e7eb; color: #111827; }
    .banner {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 14px;
      line-height: 1.45;
    }
    .banner-warn { background: #fef3c7; color: #92400e; border: 1px solid #fbbf24; }
    .banner-info { background: #eff6ff; color: #1e40af; border: 1px solid #93c5fd; }
    .hidden { display: none !important; }
    .inline-loading {
      margin: 0 0 10px;
      padding: 8px 10px;
      border-radius: 10px;
      background: #eef2ff;
      color: #1e40af;
      font-size: 12px;
      border: 1px solid #c7d2fe;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 4px 14px rgba(2, 6, 23, 0.06);
    }
    .card h2 { margin: 0 0 10px; font-size: 15px; font-weight: 700; }
    .filters label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .filter-full { width: 100%; max-width: 100%; }
    .date-range-trigger {
      width: 100%;
      max-width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }
    .date-range-trigger:active { filter: brightness(0.97); }
    .date-range-trigger .chev { flex-shrink: 0; font-size: 10px; color: var(--muted); }
    .date-range-lines { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .date-range-lines .hint { font-size: 11px; font-weight: 500; color: var(--muted); }
    .date-range-lines .val { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.35; word-break: break-all; }
    .date-range-panel {
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #f9fafb;
    }
    .date-range-panel .row { margin-bottom: 10px; }
    .date-range-panel .row:last-of-type { margin-bottom: 0; }
    .date-range-panel label { margin-bottom: 6px; }
    .date-range-panel input[type="date"] {
      width: 100%;
      min-height: 44px;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 12px;
      background: #fff;
      color: var(--text);
      box-sizing: border-box;
      appearance: none;
      -webkit-appearance: none;
      font-variant-numeric: tabular-nums;
    }
    .date-quick {
      margin: 10px 0 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .quick-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: #1f2937;
      border-radius: 999px;
      min-height: 32px;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .quick-btn:active { filter: brightness(0.96); }
    .filters select {
      width: 100%;
      max-width: 100%;
      min-height: 44px;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      box-sizing: border-box;
    }
    .rank-empty-msg {
      margin: 4px 0 0;
      padding: 16px 8px;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }
    .rank-detail-wrap { margin-top: 2px; }
    .rank-chart-box {
      position: relative;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
    }
    .rank-chart-box canvas { display: block; max-width: 100%; }
    .rank-list.ol { margin-top: 10px; padding-top: 6px; border-top: 1px solid var(--border); }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .kpi {
      background: #f9fafb;
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
    }
    .kpi .val { font-size: 15px; font-weight: 700; word-break: break-all; }
    .kpi .lab { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .mini {
      background: #f9fafb;
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
    }
    .mini .t { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
    .ol { margin: 0; padding: 0; list-style: none; counter-reset: r; }
    .ol li {
      counter-increment: r;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .ol li:last-child { border-bottom: none; }
    .ol li::before {
      content: counter(r) ".";
      flex: 0 0 22px;
      color: var(--muted);
      font-weight: 600;
    }
    .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rank-value { flex: 0 0 auto; text-align: right; font-variant-numeric: tabular-nums; min-width: 108px; }
    .rank-list {
      padding-right: 2px;
      max-height: 420px;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-bottom: 88px;
    }
    .member-list-scroll {
      max-height: 420px;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-right: 2px;
    }
    #trendDetail { position: relative; }
    .trend-tooltip {
      position: absolute;
      min-width: 120px;
      max-width: 78%;
      background: rgba(17, 24, 39, 0.92);
      color: #fff;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.5;
      padding: 8px 10px;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -108%);
      transition: opacity .12s ease;
      z-index: 3;
      box-shadow: 0 8px 18px rgba(2, 6, 23, .28);
      white-space: normal;
    }
    .trend-tooltip.show { opacity: 1; }
    .muted { color: var(--muted); font-size: 12px; }
    .perm-tip { font-size: 13px; color: var(--muted); padding: 8px 0; }
    #chatFab {
      position: fixed;
      right: 12px;
      bottom: calc(12px + var(--safe-bottom));
      z-index: 9998;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: none;
      background: transparent url("favicon.png") center/52px no-repeat;
      box-shadow: none;
      cursor: pointer;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    #chatPanel {
      display: none;
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(12px + var(--safe-bottom));
      max-height: min(64vh, 520px);
      z-index: 9999;
      background: linear-gradient(180deg, rgba(245, 247, 255, 0.98), rgba(255, 255, 255, 0.98));
      border: 1px solid rgba(118, 144, 243, 0.55);
      border-radius: 14px;
      flex-direction: column;
      box-shadow:
        0 12px 40px rgba(2, 6, 23, 0.22),
        0 0 0 2px rgba(118, 144, 243, 0.2),
        0 0 26px rgba(118, 144, 243, 0.2);
    }
    #chatPanel.open { display: flex; }
    .chat-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(118, 144, 243, 0.28);
      background: linear-gradient(90deg, rgba(118, 144, 243, 0.16), rgba(165, 180, 252, 0.06));
      font-weight: 600;
      font-size: 14px;
      color: #1e3a8a;
      border-radius: 14px 14px 0 0;
    }
    .chat-body {
      flex: 1;
      overflow: auto;
      overflow-x: hidden;
      padding: 10px 12px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.72);
    }
    .chat-msg {
      margin-bottom: 10px;
      line-height: 1.6;
      word-break: break-word;
      overflow-wrap: anywhere;
      white-space: normal;
      max-width: 94%;
    }
    .chat-msg.user {
      margin-left: auto;
      text-align: left;
      color: #166534;
      background: #dcfce7;
      border-radius: 10px;
      padding: 8px 10px;
    }
    .chat-msg.agent {
      text-align: left;
      color: #111827;
      background: #ecfdf5;
      border-radius: 10px;
      padding: 8px 10px;
      line-height: 1.55;
    }
    .assistant-paragraph { margin: 0 0 7px 0; }
    .assistant-paragraph:last-child { margin-bottom: 0; }
    .assistant-subtitle { font-weight: 600; color: #1f2937; margin-right: 4px; }
    .chat-msg.err { color: #b91c1c; }
    .chat-foot {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid rgba(118, 144, 243, 0.28);
      background: rgba(247, 249, 255, 0.95);
      border-radius: 0 0 14px 14px;
    }
    .chat-foot input { flex: 1; min-height: 42px; font-size: 16px; border-radius: 10px; border: 1px solid var(--border); padding: 0 10px; }
    #toast {
      position: fixed;
      left: 50%;
      top: 14px;
      transform: translateX(-50%);
      z-index: 10001;
      display: none;
      max-width: calc(100vw - 32px);
      background: #111827;
      color: #fff;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>
<body>
  <header class="top">
    <div>
      <h1>赫眉经营助手</h1>
      <p class="sub">数据看板（手机版）</p>
      <p class="sub" style="margin-top:2px" id="userLabel">加载中…</p>
      <p class="sub" style="margin-top:2px" id="dataUpdatedLabel">数据更新日期：—</p>
    </div>
    <div class="actions">
      <button type="button" class="btn btn-light" id="logoutBtn">退出登录</button>
    </div>
  </header>

  <div id="globalBanner" class="banner hidden"></div>
  <div id="inlineLoading" class="inline-loading hidden">正在刷新数据...</div>

  <section class="card filters" id="filterCard">
    <h2>筛选</h2>
    <div class="filter-full">
      <label for="dateRangeTrigger">日期范围</label>
      <button type="button" class="date-range-trigger" id="dateRangeTrigger" aria-expanded="false" aria-controls="dateRangePanel">
        <span class="date-range-lines">
          <span class="hint">当前区间</span>
          <span class="val" id="dateRangeLabel">—</span>
        </span>
        <span class="chev" aria-hidden="true">▼</span>
      </button>
      <div class="date-range-panel hidden" id="dateRangePanel" role="region" aria-label="选择日期">
        <div class="row">
          <label for="startDate">开始日期</label>
          <input type="date" id="startDate" />
        </div>
        <div class="row">
          <label for="endDate">结束日期</label>
          <input type="date" id="endDate" />
        </div>
        <div class="date-quick">
          <button type="button" class="quick-btn" id="quick7d">近7天</button>
          <button type="button" class="quick-btn" id="quick30d">近30天</button>
          <button type="button" class="quick-btn" id="quickMonth">本月</button>
        </div>
      </div>
    </div>
    <div style="margin-top:12px">
      <label for="storeSelect">门店</label>
      <select id="storeSelect"></select>
    </div>
    <button type="button" class="btn btn-primary" style="margin-top:12px;width:100%" id="applyFiltersBtn">应用筛选</button>
  </section>

  <section class="card hidden" id="coreKpiCard">
    <h2>核心 KPI</h2>
    <div class="kpi-grid" id="coreKpis"></div>
  </section>

  <section class="card hidden" id="overviewCard">
    <h2>今日 / 本月概览</h2>
    <div class="mini-grid" id="todayMonth"></div>
  </section>

  <section class="card hidden" id="trendCard">
    <h2>销售趋势</h2>
    <p class="rank-empty-msg hidden" id="trendEmptyMsg">暂无趋势数据</p>
    <div class="rank-detail-wrap hidden" id="trendDetail">
      <div class="rank-chart-box">
        <canvas id="chartTrend"></canvas>
      </div>
    </div>
  </section>

  <section class="card hidden" id="rankStoresCard">
    <h2>门店排行 Top 10</h2>
    <p class="rank-empty-msg hidden" id="rankStoresEmptyMsg">暂无可展示的排行数据</p>
    <div class="rank-detail-wrap hidden" id="rankStoresDetail">
      <div class="rank-chart-box">
        <canvas id="chartStores"></canvas>
      </div>
      <ol class="ol rank-list" id="listStores"></ol>
    </div>
  </section>
  <section class="card hidden" id="rankSalesCard">
    <h2>销售员排行 Top 10</h2>
    <p class="rank-empty-msg hidden" id="rankSalesEmptyMsg">暂无可展示的排行数据</p>
    <div class="rank-detail-wrap hidden" id="rankSalesDetail">
      <div class="rank-chart-box">
        <canvas id="chartSales"></canvas>
      </div>
      <ol class="ol rank-list" id="listSales"></ol>
    </div>
  </section>
  <section class="card hidden" id="rankProductsCard">
    <h2>商品排行 Top 10</h2>
    <p class="rank-empty-msg hidden" id="rankProductsEmptyMsg">暂无可展示的排行数据</p>
    <div class="rank-detail-wrap hidden" id="rankProductsDetail">
      <div class="rank-chart-box">
        <canvas id="chartProducts"></canvas>
      </div>
      <ol class="ol rank-list" id="listProducts"></ol>
    </div>
  </section>

  <section class="card hidden" id="memberCard">
    <h2>会员维护摘要</h2>
    <div id="memberSummary"></div>
  </section>

  <section class="card hidden" id="sleepCard">
    <h2>沉睡会员摘要</h2>
    <div style="border:1px dashed var(--border);border-radius:10px;padding:8px;margin-bottom:8px;background:rgba(255,255,255,.45)">
      <p class="muted" style="margin:0 0 6px 0">子筛选（仅作用于沉睡会员清单）</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:end">
      <label class="muted" style="display:flex;flex-direction:column;gap:4px">
        <span>沉睡天数（天）</span>
        <input id="sleepDaysInput" type="number" min="1" step="1" value="90" style="height:34px;border:1px solid var(--border);border-radius:8px;padding:0 8px" />
      </label>
      <label class="muted" style="display:flex;flex-direction:column;gap:4px">
        <span>最低历史订单数</span>
        <input id="sleepMinOrdersInput" type="number" min="0" step="1" value="2" style="height:34px;border:1px solid var(--border);border-radius:8px;padding:0 8px" />
      </label>
      <label class="muted" style="display:flex;flex-direction:column;gap:4px">
        <span>最低累计消费额</span>
        <input id="sleepMinAmountInput" type="number" min="0" step="1" value="1000" style="height:34px;border:1px solid var(--border);border-radius:8px;padding:0 8px" />
      </label>
      <button type="button" class="btn btn-light" id="sleepFilterApplyBtn" style="min-height:34px">应用筛选</button>
    </div>
    </div>
    <div id="sleepSummary"></div>
  </section>

  <button type="button" id="chatFab" aria-label="打开AI助手"></button>
  <div id="chatPanel">
    <div class="chat-head">
      <span>AI助手</span>
      <div style="display:flex;gap:6px;align-items:center">
        <button type="button" class="btn btn-light" id="chatReset" style="min-height:32px;padding:0 10px">重置对话</button>
        <button type="button" class="btn btn-light" id="chatClose" style="min-height:32px;padding:0 10px">关闭</button>
      </div>
    </div>
    <div class="chat-body" id="chatMessages"></div>
    <div class="chat-foot">
      <input type="text" id="chatInput" placeholder="请输入你的问题…" autocomplete="off" />
      <button type="button" class="btn btn-primary" id="chatSend">发送</button>
    </div>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://g.alicdn.com/dingding/dingtalk-jsapi/3.0.36/dingtalk.open.js"></script>
  <script src="/frontend/src/visual/galaxy-background.js"></script>
  <script>
(function () {
  window.initGalaxyBackground({ includeEarth: true, mapAssistantButton: true });
  var earthCaption = document.querySelector(".earth-caption");
  if (earthCaption) {
    earthCaption.innerHTML = 'GLOBAL BUSINESS NETWORK<span class="earth-hint">DRAG TO ROTATE · PINCH TO ZOOM</span>';
  }

  const NO_PERM_DATA = "当前账号暂无可查看数据，请联系管理员配置权限。";
  const NO_IMPORT = "暂无数据，请管理员先在后台导入 Excel。";
  const MOD_FORBIDDEN = "暂无权限查看此模块";

  let user = null;
  let datasetId = null;
  let dateBounds = { min: "", max: "" };
  let state = {
    startDate: "",
    endDate: "",
    store: "",
  };
  let sleepFilterState = {
    sleepDays: 90,
    sleepMinOrders: 2,
    sleepMinAmount: 1000,
  };
  let dateRefreshTimer = null;
  let toastTimer = null;
  let dingtalkBindTried = false;
  let latestDatasetUpdatedAt = "";

  const AGENT_CHAT_SESSION_KEY = "salesAgentConversationId";
  function persistAgentConversationId(nid) {
    try {
      localStorage.setItem(AGENT_CHAT_SESSION_KEY, nid);
    } catch (_e) {}
    try {
      sessionStorage.setItem(AGENT_CHAT_SESSION_KEY, nid);
    } catch (_e2) {}
  }
  function getOrCreateAgentConversationId() {
    try {
      var fromLs = localStorage.getItem(AGENT_CHAT_SESSION_KEY);
      if (fromLs && String(fromLs).length <= 64) return String(fromLs);
    } catch (_e) {}
    try {
      var fromSs = sessionStorage.getItem(AGENT_CHAT_SESSION_KEY);
      if (fromSs && String(fromSs).length <= 64) {
        persistAgentConversationId(fromSs);
        return String(fromSs);
      }
    } catch (_e3) {}
    var nid = "agent-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
    persistAgentConversationId(nid);
    return nid;
  }
  function mintAgentConversationId() {
    var nid = "agent-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
    persistAgentConversationId(nid);
    return nid;
  }
  let agentConversationId = getOrCreateAgentConversationId();
  const chatMessages = [];

  const rankCharts = { stores: null, sales: null, products: null };
  let trendChart = null;
  const TREND_TOOLTIP_ID = "trendTooltip";
  const trendSeriesMeta = [];
  const RANK_BAR_BG = "rgba(118, 144, 243, 0.78)";
  const RANK_BAR_BORDER = "#7690f3";
  const MEMBER_INITIAL_LIMIT = 100;
  const MEMBER_LOAD_STEP = 100;
  const MEMBER_MAX_ROWS = 50000;
  const SLEEP_INITIAL_LIMIT = 100;
  const SLEEP_LOAD_STEP = 100;
  const SLEEP_MAX_ROWS = 50000;
  let fabIgnoreClickUntil = 0;
  let memberPagingState = {
    rows: [],
    loading: false,
    hasMore: false,
    filterBase: null,
    storeParam: null,
  };
  let sleepPagingState = {
    rows: [],
    loading: false,
    hasMore: false,
    filterBase: null,
    storeParam: null,
    sleepSummary: [],
  };
  const DEBUG_FRONTEND_DATASET_CHECK = (function () {
    try {
      var params = new URLSearchParams(window.location.search || "");
      var fromQuery = params.get("debugDataCheck") === "1" || params.get("debug") === "1";
      var fromStorage = window.localStorage && window.localStorage.getItem("debugDataCheck") === "1";
      return Boolean(fromQuery || fromStorage);
    } catch (_err) {
      return false;
    }
  })();

  function debugDatasetConsistency(stage, payload) {
    if (!DEBUG_FRONTEND_DATASET_CHECK) return;
    try {
      console.log("[mobile-data-check]", stage, Object.assign({
        ts: new Date().toISOString(),
        datasetId: datasetId || "",
        startDate: state.startDate || "",

      id: "rankBarHeadLabelPlugin",
      afterDatasetsDraw: function (chart) {
        var meta = chart.getDatasetMeta(0);
        if (!meta || !Array.isArray(meta.data)) return;

        ctx.save();

        animation: false,
        layout: { padding: { right: 6 } },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: function (items) {
                const i = items[0] ? items[0].dataIndex : 0;
                return String(labels[i] != null ? labels[i] : "");
              },
              label: function (ctx) {
                return fmtVal(Number(ctx.raw || 0));
              },
            },
          },
        },
        scales: {
          x: {
            grid: { color: "rgba(229, 231, 235, 0.95)", drawBorder: false },
            ticks: {
              font: { size: 10 },
              maxTicksLimit: 6,
            },
            border: { display: false },
          },
          y: {
            grid: { display: false },
            ticks: {
              display: false,
              font: { size: 11 },
              autoSkip: false,
              callback: function (val) {
                var idx = Number(val);
                var s = String(labels[idx] != null ? labels[idx] : "");
                return s.length > 12 ? s.slice(0, 11) + "…" : s;

  function renderTrendLine(labels, values) {
    var canvas = document.getElementById("chartTrend");
    var box = canvas && canvas.parentElement;
    var empty = document.getElementById("trendEmptyMsg");
    var detail = document.getElementById("trendDetail");
    if (trendChart) {
      trendChart.destroy();
      trendChart = null;
    }
    if (!canvas || !box || !labels.length) {
      if (empty) empty.classList.remove("hidden");
      if (detail) detail.classList.add("hidden");
      return;
    }
    if (empty) empty.classList.add("hidden");
    if (detail) detail.classList.remove("hidden");
    var trendTooltip = document.getElementById(TREND_TOOLTIP_ID);
    if (!trendTooltip && detail) {
      trendTooltip = document.createElement("div");
      trendTooltip.id = TREND_TOOLTIP_ID;
      trendTooltip.className = "trend-tooltip";
      detail.appendChild(trendTooltip);
    }
    box.style.height = "240px";
    const trendCrosshairPlugin = {
      id: "trendCrosshairPlugin",
      afterDatasetsDraw: function (chart) {
        const active = chart.tooltip && chart.tooltip.getActiveElements ? chart.tooltip.getActiveElements() : [];
        if (!active || !active.length) return;
        const x = active[0].element.x;
        const area = chart.chartArea;
        const ctx = chart.ctx;
        ctx.save();
        ctx.beginPath();
        ctx.setLineDash([4, 4]);
        ctx.lineWidth = 1;
        ctx.strokeStyle = "rgba(37, 99, 235, 0.9)";
        ctx.moveTo(x, area.top);
        ctx.lineTo(x, area.bottom);
        ctx.stroke();
        ctx.restore();
      },
    };
    trendChart = new Chart(canvas, {
      type: "line",
      data: {
        labels: labels.slice(),
        datasets: [
          {
            label: "销售额",
            data: values.slice(),
            borderColor: "#2563eb",
            backgroundColor: "rgba(37, 99, 235, 0.12)",
            borderWidth: 2,
            pointRadius: 0,
            pointHoverRadius: 3,
            fill: true,
            tension: 0.25,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: { mode: "index", intersect: false },
        elements: { point: { hitRadius: 30 } },
        plugins: {
          legend: { display: false },
          tooltip: {
            enabled: false,
            position: "nearest",
            mode: "index",
            intersect: false,
            external: function (context) {
              var model = context.tooltip;
              var tipEl = document.getElementById(TREND_TOOLTIP_ID);
              if (!tipEl || !detail) return;
              if (!model || !model.opacity || !model.dataPoints || !model.dataPoints.length) {
                tipEl.classList.remove("show");
                return;
              }
              var idx = model.dataPoints[0].dataIndex;
              var row = trendSeriesMeta[idx] || {};
              if (!row || (row.sales == null && values[idx] == null)) {
                tipEl.innerHTML = '<div style="font-weight:600;">No data available for this period.</div>';
                tipEl.style.left = "50%";
                tipEl.style.top = "16px";
                tipEl.classList.add("show");
                return;
              }
              var html = '<div style="font-weight:600;margin-bottom:2px;">' + escapeHtml(String(row.day || labels[idx] || "")) + "</div>";
              html += '<div>销售额：' + escapeHtml(fmtMoney(Number(row.sales || values[idx] || 0))) + "</div>";
              if (row.orderCount != null) html += '<div>订单数：' + escapeHtml(fmtInt(Number(row.orderCount || 0))) + "</div>";
              if (row.storeCount != null) html += '<div>门店数：' + escapeHtml(fmtInt(Number(row.storeCount || 0))) + "</div>";
              tipEl.innerHTML = html;
              const area = context.chart.chartArea;
              var left = model.caretX;
              var top = Math.max(area.top + 14, model.caretY);
              left = Math.max(42, Math.min(left, detail.clientWidth - 42));
              tipEl.style.left = left + "px";
              tipEl.style.top = top + "px";
              tipEl.classList.add("show");
            },
            callbacks: {
              label: function (ctx) {
                return fmtMoney(Number(ctx.raw || 0));
              },
            },
          },
        },
        scales: {
          x: {
            ticks: { maxTicksLimit: 7, font: { size: 10 } },
            grid: { display: false },
          },
          y: {
            ticks: {
              maxTicksLimit: 6,
              font: { size: 10 },
              callback: function (v) {
                var n = Number(v || 0);
                if (Math.abs(n) >= 10000) return (n / 10000).toFixed(1) + "万";
                return Math.round(n).toString();
              },
            },
            grid: { color: "rgba(229,231,235,0.9)" },
          },
        },
      },
      plugins: [trendCrosshairPlugin],
    });
    var hideTip = function () {
      var tipEl = document.getElementById(TREND_TOOLTIP_ID);
      if (tipEl) tipEl.classList.remove("show");
      if (trendChart && trendChart.tooltip) {
        trendChart.tooltip.setActiveElements([], { x: 0, y: 0 });
        trendChart.update("none");
      }
    };
    var activateByPointerX = function (evt) {
      if (!trendChart || !trendChart.canvas) return;
      var nativeEvt = evt && evt.touches && evt.touches[0] ? evt.touches[0] : evt;
      if (!nativeEvt) return;
      var rect = trendChart.canvas.getBoundingClientRect();
      if (!rect || !rect.width || !rect.height) return;
      var cx = Number(nativeEvt.clientX || 0);
      var cy = Number(nativeEvt.clientY || 0);
      if (cx < rect.left || cx > rect.right || cy < rect.top || cy > rect.bottom) {
        hideTip();
        return;
      }
      // Chart.js hit-testing uses CSS pixels, not device pixels.
      // Using canvas.width/rect.width here causes 2x/3x offsets on mobile retina screens.
      var xPixel = cx - rect.left;
      var labelsLen = Array.isArray(labels) ? labels.length : 0;
      if (!labelsLen) return;
      var idx = 0;
      var nearestDist = Number.POSITIVE_INFINITY;
      var meta = trendChart.getDatasetMeta && trendChart.getDatasetMeta(0);
      var points = meta && Array.isArray(meta.data) ? meta.data : [];
      if (points.length) {
        for (var i = 0; i < points.length; i += 1) {
          var px = Number(points[i] && points[i].x);
          if (!Number.isFinite(px)) continue;
          var d = Math.abs(px - xPixel);
          if (d < nearestDist) {
            nearestDist = d;
            idx = i;
          }
        }
      } else {
        var xScale = trendChart.scales && trendChart.scales.x;
        if (!xScale) return;
        var rawIdx = xScale.getValueForPixel(xPixel);
        idx = Math.max(0, Math.min(labelsLen - 1, Math.round(Number(rawIdx || 0))));
      }
      trendChart.tooltip.setActiveElements([{ datasetIndex: 0, index: idx }], {
        x: points[idx] && Number.isFinite(Number(points[idx].x)) ? Number(points[idx].x) : xPixel,
        y: trendChart.chartArea ? trendChart.chartArea.top + 12 : 12,
      });
      trendChart.update("none");
    };
    canvas.onpointerleave = hideTip;
    canvas.onpointerdown = activateByPointerX;
    canvas.onpointermove = activateByPointerX;
    canvas.onpointerup = function () { setTimeout(hideTip, 700); };
    canvas.ontouchstart = activateByPointerX;
    canvas.ontouchmove = activateByPointerX;
    canvas.ontouchend = function () { setTimeout(hideTip, 700); };
  }

  function hasPerm(key) {
    return Boolean(user && user.permissions && user.permissions[key]);
  }

  function showBanner(kind, text) {
    const el = document.getElementById("globalBanner");
    el.className = "banner " + (kind === "warn" ? "banner-warn" : "banner-info");
    el.textContent = text;
    el.classList.remove("hidden");
  }
  function showToast(text, type) {
    var toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = text || "";
    toast.style.background = type === "error" ? "#b91c1c" : (type === "success" ? "#166534" : "#111827");
    toast.style.display = "block";
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toast.style.display = "none"; }, 2000);
  }
  function setButtonLoading(btn, isLoading, loadingText) {
    if (!btn) return;
    if (!btn.dataset.originText) btn.dataset.originText = btn.textContent || "";
    btn.disabled = !!isLoading;
    btn.style.opacity = isLoading ? "0.75" : "";
    btn.textContent = isLoading ? (loadingText || "加载中...") : btn.dataset.originText;
  }
  function showInlineLoading(message) {
    var el = document.getElementById("inlineLoading");
    if (!el) return;
    el.textContent = message || "正在刷新数据...";
    el.classList.remove("hidden");
  }
  function hideInlineLoading() {
    var el = document.getElementById("inlineLoading");
    if (!el) return;
    el.classList.add("hidden");
  }
  function hideBanner() {
    document.getElementById("globalBanner").classList.add("hidden");
  }

  function fmtMoney(n) {
    const x = Number(n) || 0;
    return x.toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " 元";
  }
  function fmtInt(n) {
    return String(Math.round(Number(n) || 0));
  }

  function qs(obj) {
    const u = new URLSearchParams();
    for (const [k, v] of Object.entries(obj)) {
      if (v == null || v === "") continue;
      if (Array.isArray(v)) {
        if (v.length) u.set(k, v.join(","));
      } else {
        u.set(k, String(v));
      }
    }
    return u.toString();
  }

  async function fetchJson(url, opt) {
    const res = await fetch(url, { credentials: "same-origin", ...opt });
    const data = await res.json().catch(function () { return {}; });
    if (!res.ok) throw new Error(data.error || "HTTP " + res.status);
    return data;
  }

  function setSectionVisible(id, show) {
    document.getElementById(id).classList.toggle("hidden", !show);
  }

  function renderKpiGrid(containerId, kpis) {
    const el = document.getElementById(containerId);
    el.innerHTML =
      '<div class="kpi"><div class="val">' +
      fmtMoney(kpis.totalSales) +
      '</div><div class="lab">销售额</div></div>' +
      '<div class="kpi"><div class="val">' +
      fmtInt(kpis.totalOrders) +
      '</div><div class="lab">订单数</div></div>' +
      '<div class="kpi"><div class="val">' +
      fmtInt(kpis.uniqueMembers) +
      '</div><div class="lab">会员数</div></div>';
  }

  function renderOl(id, rows, fmtVal) {
    const el = document.getElementById(id);
    if (!rows.length) {
      el.innerHTML = "";
      return;
    }
    function stripLeadingRankPrefix(name) {
      return String(name || "").replace(/^\s*\d+\s*[.。．、)\]]\s*/, "").trim();
    }
    el.innerHTML = rows
      .map(function (r) {
        return (
          '<li><span class="name">' +
          escapeHtml(stripLeadingRankPrefix(r.name)) +
          '</span><span class="rank-value">' +
          fmtVal(r.val) +
          "</span></li>"
        );
      })
      .join("");
  }

  function escapeHtml(s) {
    return String(s != null ? s : "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function ymd(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
  }

  function formatDateZh(dateString) {
    if (!dateString || !/^\d{4}-\d{2}-\d{2}$/.test(dateString)) {
      return "—";
    }
    var p = dateString.split("-");
    return p[0] + "年" + String(Number(p[1])) + "月" + String(Number(p[2])) + "日";
  }

  function updateDateRangeLabel() {
    var el = document.getElementById("dateRangeLabel");
    if (!el) return;
    if (!state.startDate || !state.endDate) {
      el.textContent = "请选择日期范围";
      return;
    }
    el.textContent = formatDateZh(state.startDate) + " 至 " + formatDateZh(state.endDate);
  }

  function queueDateRefresh() {
    if (dateRefreshTimer) clearTimeout(dateRefreshTimer);
    dateRefreshTimer = setTimeout(async function () {
      if (!datasetId) return;
      showInlineLoading("正在刷新数据...");
      try {
        await loadAllData();
      } catch (e) {
        showToast((e && e.message) || "刷新失败", "error");
      } finally {
        hideInlineLoading();
      }
    }, 300);
  }

  function applyDateRangeFromInputs() {
    var s = document.getElementById("startDate").value || "";
    var e = document.getElementById("endDate").value || "";
    if (!s || !e) return;
    if (s > e) {
      showBanner("warn", "开始日期不能晚于结束日期");
      return;
    }
    state.startDate = s;
    state.endDate = e;
    updateDateRangeLabel();
    hideBanner();
    queueDateRefresh();
  }

  function readSleepFilterFromInputs() {
    var d = Number((document.getElementById("sleepDaysInput") || {}).value || 90);
    var o = Number((document.getElementById("sleepMinOrdersInput") || {}).value || 2);
    var a = Number((document.getElementById("sleepMinAmountInput") || {}).value || 1000);
    sleepFilterState.sleepDays = Math.max(1, Math.floor(Number.isFinite(d) ? d : 90));
    sleepFilterState.sleepMinOrders = Math.max(0, Math.floor(Number.isFinite(o) ? o : 2));
    sleepFilterState.sleepMinAmount = Math.max(0, Math.floor(Number.isFinite(a) ? a : 1000));
  }

  function formatDateYmd(value) {
    var s = String(value || "").trim();
    if (!s) return "";
    var m = s.match(/^\d{4}-\d{2}-\d{2}/);
    if (m) return m[0];
    var d = new Date(s);
    if (Number.isNaN(d.getTime())) return "";
    return ymd(d);
  }

  function refreshDataUpdatedLabel() {
    var el = document.getElementById("dataUpdatedLabel");
    if (!el) return;
    var day = formatDateYmd(latestDatasetUpdatedAt);
    el.textContent = "数据更新日期：" + (day || "—");
  }

  async function loadLatestDataset() {
    const [scopeData, latestData] = await Promise.all([
      fetchJson("/api/v2/datasets/aggregate-scope"),
      fetchJson("/api/v2/datasets/latest").catch(function () { return { ok: false, dataset: null }; }),
    ]);
    latestDatasetUpdatedAt = latestData && latestData.dataset
      ? String(latestData.dataset.created_at || latestData.dataset.createdAt || "")
      : "";
    refreshDataUpdatedLabel();
    return scopeData.ok && Number(scopeData.datasetCount) > 0 ? "__all_ready__" : null;
  }

  async function loadFilterOptions() {
    if (!datasetId || !hasPerm("canUseFilters")) return null;
    const q = qs({ startDate: state.startDate, endDate: state.endDate });
    const url = "/api/v2/datasets/" + encodeURIComponent(datasetId) + "/filters/options" + (q ? "?" + q : "");
    return fetchJson(url);
  }

  function populateStoreSelect(stores) {
    const sel = document.getElementById("storeSelect");
    const cur = state.store;
    sel.innerHTML = '<option value="">全部门店</option>';
    (stores || []).forEach(function (s) {
            const o = document.createElement("option");
            o.value = s;
            o.textContent = s;
            sel.appendChild(o);
          });
    if (cur && stores && stores.indexOf(cur) >= 0) sel.value = cur;
    else sel.value = "";
  }

  async function fetchKpis(extra) {
    if (!datasetId || !hasPerm("canViewKpi")) return null;
    const f = {
      startDate: extra.startDate != null ? extra.startDate : state.startDate,
      endDate: extra.endDate != null ? extra.endDate : state.endDate,
      stores: state.store ? [state.store] : [],
    };
    const q = qs(f);
    const url = "/api/v2/datasets/" + encodeURIComponent(datasetId) + "/kpis?" + q;
    const data = await fetchJson(url);
    return data.kpis || null;
  }

  async function fetchRank(path, perm) {
    if (!datasetId || !hasPerm(perm)) return [];
    const f = { startDate: state.startDate, endDate: state.endDate, stores: state.store ? [state.store] : [] };
    const q = qs(f) + "&limit=500&offset=0";
    const url =
      "/api/v2/datasets/" + encodeURIComponent(datasetId) + path + (q ? "?" + q : "");
    const data = await fetchJson(url);
    return data.rows || [];
  }

  async function fetchTrend() {
    if (!datasetId || !hasPerm("canViewTrendCharts")) return [];
    const f = { startDate: state.startDate, endDate: state.endDate, stores: state.store ? [state.store] : [] };
    const q = qs(f);
    const url = "/api/v2/datasets/" + encodeURIComponent(datasetId) + "/trends" + (q ? "?" + q : "");
    const data = await fetchJson(url);

  async function fetchTopMembersPage(filterBase, storeParam, limit, offset) {
    if (!datasetId || !hasPerm("canViewMemberAnalysis")) return [];
    var safeLimit = Math.max(1, Math.min(500, Number(limit) || MEMBER_LOAD_STEP));
    var safeOffset = Math.max(0, Number(offset) || 0);
    var q = qs(Object.assign({}, filterBase, storeParam, { limit: safeLimit, offset: safeOffset })) || "";
    var url = "/api/v2/datasets/" + encodeURIComponent(datasetId) + "/members/top?" + q;
    var data = await fetchJson(url);
    return Array.isArray(data && data.rows) ? data.rows : [];
  }

  async function fetchSleepingPage(filterBase, storeParam, limit, offset) {
    if (!datasetId || !hasPerm("canViewSleepingMembers")) return null;
    readSleepFilterFromInputs();
    var safeLimit = Math.max(1, Math.min(2000, Number(limit) || SLEEP_LOAD_STEP));
    var safeOffset = Math.max(0, Number(offset) || 0);
    const q =
      qs(
        Object.assign({}, filterBase, storeParam, {
          sleepDays: sleepFilterState.sleepDays,
          sleepMinOrders: sleepFilterState.sleepMinOrders,
          sleepMinAmount: sleepFilterState.sleepMinAmount,
          aclassMinAmount: 3000,
          aclassMinOrders: 5,
          analysisDate: state.endDate || "",
          limit: safeLimit,
          offset: safeOffset,
        })
      ) || "";
    const url = "/api/v2/datasets/" + encodeURIComponent(datasetId) + "/members/sleeping?" + q;
    return fetchJson(url);

  function renderSleepingSection() {
    if (!hasPerm("canViewSleepingMembers")) {
      setSectionVisible("sleepCard", false);
      return;
    }
    setSectionVisible("sleepCard", true);
    const sleepRows = Array.isArray(sleepPagingState.rows) ? sleepPagingState.rows : [];
    const sleepSummaryRows = Array.isArray(sleepPagingState.sleepSummary) ? sleepPagingState.sleepSummary : [];
    const showLoadMore = sleepPagingState.hasMore && sleepRows.length < SLEEP_MAX_ROWS;
    const sleepListHtml = sleepRows.length
      ? '<p class="muted">沉睡会员清单：</p><ol class="ol member-list-scroll">' +
        sleepRows
          .map(function (m) {
            const who = escapeHtml(m.member_name || m.member_id || m.member_key || "未知会员");
            const days = Number(m.sleep_days || m.sleepDays || 0);
            const right = days > 0 ? days + " 天未消费" : "—";
            return '<li style="padding-left:4px"><span class="name">' + who + '</span><span>' + right + "</span></li>";
          })
          .join("") +
        "</ol>" +
        (showLoadMore
          ? '<div style="margin-top:10px;text-align:center;"><button type="button" class="btn btn-light" id="sleepLoadMoreBtn" style="min-height:36px;padding:0 14px;">加载更多沉睡会员（+100）</button></div>'
          : "")
      : '<p class="muted">暂无沉睡会员清单</p>';
    const lines = sleepSummaryRows
      .map(function (row) {
        const lab = row.metric;
        const val = row.value;
        const isCurrency =
          typeof val === "number" &&
          (String(row.metric).indexOf("消费额") >= 0 || String(row.metric).indexOf("Spend") >= 0);
        const disp = isCurrency ? fmtMoney(val) : typeof val === "number" ? fmtInt(val) : escapeHtml(String(val));
        return "<div style=\"display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #e5e7eb;font-size:13px\"><span>" +
          lab +
          "</span><span>" +
          disp +
          "</span></div>";
      })

  async function loadMoreSleepingAndRender() {
    if (sleepPagingState.loading || !sleepPagingState.hasMore) return;
    sleepPagingState.loading = true;
    var btn = document.getElementById("sleepLoadMoreBtn");
    var oldList = document.querySelector("#sleepSummary .member-list-scroll");
    var prevScrollTop = oldList ? oldList.scrollTop : 0;
    if (btn) {
      btn.disabled = true;
      btn.textContent = "加载中...";
    }
    try {
      var offset = (sleepPagingState.rows || []).length;
      var data = await fetchSleepingPage(
        sleepPagingState.filterBase || {},
        sleepPagingState.storeParam || {},
        SLEEP_LOAD_STEP,
        offset
      );
      var rows = Array.isArray(data && data.rows) ? data.rows : Array.isArray(data && data.sleepList) ? data.sleepList : [];
      if (rows.length) {
        sleepPagingState.rows = (sleepPagingState.rows || []).concat(rows).slice(0, SLEEP_MAX_ROWS);

      sleepPagingState.hasMore = rows.length === SLEEP_LOAD_STEP && sleepPagingState.rows.length < SLEEP_MAX_ROWS;

      if (newList) newList.scrollTop = prevScrollTop;

        rows: (sleepPagingState.rows || []).slice(),
        sleepList: (sleepPagingState.rows || []).slice(),
        sleepSummary: (sleepPagingState.sleepSummary || []).slice(),
      };

        btn.textContent = "加载更多沉睡会员（+100）";

      sleepPagingState.loading = false;

  function kpiNum(obj, keys) {
    if (!obj) return 0;
    for (var i = 0; i < keys.length; i += 1) {
      var k = keys[i];
      if (obj[k] != null && obj[k] !== "") return Number(obj[k]);
    }
    return 0;
  }

  function buildSalesContext(coreKpis, stores, sales, products, members, sleeping) {
    const ts = coreKpis
      ? Number(
          coreKpis.totalsales !== undefined && coreKpis.totalsales !== null
            ? coreKpis.totalsales
            : coreKpis.totalSales || 0
        )
      : 0;
    const to = coreKpis
      ? Number(
          coreKpis.totalorders !== undefined && coreKpis.totalorders !== null
            ? coreKpis.totalorders
            : coreKpis.totalOrders || 0
        )
      : 0;
    let sleepN = 0;
    let sleepA = 0;
    ((sleeping && sleeping.sleepSummary) || []).forEach(function (r) {
      if (r.metric === "沉睡会员人数" || r.metric === "Sleeping Members") sleepN = Number(r.value || 0);
      if (r.metric === "A 类会员人数" || r.metric === "A-Class Members") sleepA = Number(r.value || 0);
    });
    return {
      datasetId: datasetId,
      updatedAt: new Date().toISOString(),
      filters: {
        startDate: state.startDate,
        endDate: state.endDate,
        stores: state.store ? [state.store] : [],
        salespeople: [],
        products: [],
        sleepingSalesperson: "",
      },
      kpis: {
        totalSales: ts,
        totalOrders: to,
        memberRegistrationRate: kpiNum(coreKpis, [
          "memberRegistrationRate",
          "memberregistrationrate",
          "member_registration_rate",
        ]),
        repurchaseRate: kpiNum(coreKpis, ["repurchaseRate", "repurchaserate", "repurchase_rate"]),
        averageRepurchaseTimes: kpiNum(coreKpis, [
          "averageRepurchaseTimes",
          "averagerepurchasetimes",
          "average_repurchase_times",
        ]),
        sleepingMembers: sleepN,
        aClassSleepingMembers: sleepA,
        filesLoaded: Math.max(
          1,
          kpiNum(coreKpis, ["filesLoaded", "filesloaded", "files_loaded"]) || 1
        ),
      },
      topStores: (stores || []).map(function (r) {
        return { store: r.store, performance: Number(r.performance || 0) };
      }),
      topSalespeople: (sales || []).map(function (r) {
        return { salesperson: r.salesperson, performance: Number(r.performance || 0) };
      }),
      topProducts: (products || []).map(function (r) {
        return {
          product: r.product,
          sales_amount: Number(r.sales_amount || 0),
          sales_qty: Number(r.sales_qty || 0),
          sales_orders: Number(r.sales_orders || 0),
        };
      }),
      memberRank: (members || []).map(function (m) {
        const orders = Number(m.order_count || 0);
        const spend = Number(m.total_spend || 0);
        return {
          member_key: String(m.member_id || m.member_name || ""),
          member_name: String(m.member_name || ""),
          total_spend: spend,
          order_count: orders,
          avg_ticket: orders ? spend / orders : 0,
          repurchase_times: Math.max(0, orders - 1),
          phone: String(m.phone || ""),
          latest_store: "",
          latest_salesperson: "",
        };
      }),
      sleepList: ((sleeping && sleeping.rows) || []).slice(0, 120).map(function (r) {
        return {
          member_key: String(r.member_key || ""),
          member_name: String(r.member_name || ""),
          total_spend: Number(r.total_spend || 0),
          order_count: Number(r.order_count || 0),
          sleep_days: Number(r.sleep_days || 0),
          priority: String(r.priority || ""),
          risk_level: String(r.risk_level || ""),
          last_store: String(r.last_store || ""),
          last_salesperson: String(r.last_salesperson || ""),
          phone: String(r.phone || ""),
        };
      }),
    };
  }

  let cacheForChat = {
    coreKpis: null,
    stores: [],
    sales: [],
    products: [],
    members: [],
    sleeping: null,
  };

  function compactSalesContextForChat(ctx) {
    if (!ctx || typeof ctx !== "object") return ctx;
    return {
      ...ctx,
      topStores: (ctx.topStores || []).slice(0, 300),
      topSalespeople: (ctx.topSalespeople || []).slice(0, 300),
      topProducts: (ctx.topProducts || []).slice(0, 300),
      memberRank: (ctx.memberRank || []).slice(0, 2000),
      sleepList: (ctx.sleepList || []).slice(0, 2000),
      dailyTrend: (ctx.dailyTrend || []).slice(0, 1500),
      monthlyTrend: (ctx.monthlyTrend || []).slice(0, 1500),
      weeklyTrend: (ctx.weeklyTrend || []).slice(0, 1500),
    };
  }

  async function syncChatContext() {
    if (!datasetId || !hasPerm("canUseAgentChat")) return { ok: false, error: "未开放数据助手" };
    const ctx = buildSalesContext(
      cacheForChat.coreKpis,
      cacheForChat.stores,
      cacheForChat.sales,
      cacheForChat.products,
      cacheForChat.members,
      cacheForChat.sleeping
    );
    var res = await fetch("/api/chat/context", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "same-origin",
      body: JSON.stringify({ conversationId: agentConversationId, salesContext: ctx }),
    });
    if (res.status === 413) {
      res = await fetch("/api/chat/context", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ conversationId: agentConversationId, salesContext: compactSalesContextForChat(ctx) }),
      });
    }
    const data = await res.json().catch(function () { return {}; });
    if (!res.ok) return { ok: false, error: data.error || "上下文同步失败" };
    return { ok: true };
  }

  function renderChat() {
    const el = document.getElementById("chatMessages");
    el.innerHTML = chatMessages
      .map(function (m) {
        var role = m.role === "user" ? "user" : m.role === "err" ? "err" : "agent";
        var body = "";
        if (role === "agent") {
          body = formatAssistantMessageForMobile(String(m.text || ""));
        } else {
          body = escapeHtml(String(m.text || ""));
        }
        return (
          '<div class="chat-msg ' +
          role +
          '">' +
          body +
          "</div>"
        );
      })
      .join("");
    el.scrollTop = el.scrollHeight;
  }

  function formatAssistantMessageForMobile(text) {
    var raw = String(text || "").replace(/\r\n?/g, "\n");
    var lines = raw.split("\n");
    var cleaned = [];
    for (var i = 0; i < lines.length; i += 1) {
      var line = String(lines[i] || "");
      if (/^\s*```/.test(line)) continue;
      line = line
        .replace(/^\s{0,3}#{1,6}\s*/g, "")
        .replace(/\*\*(.*?)\*\*/g, "$1")
        .replace(/\*(.*?)\*/g, "$1")
        .replace(/`+/g, "")
        .replace(/^\s*[-*•]\s+/g, "")
        .replace(/^\s*\d+\.\s+/g, "")
        .replace(/\|/g, " ");
      if (/^\s*[:\-]{3,}\s*$/.test(line)) continue;
      line = line.replace(/\s+/g, " ").trim();
      cleaned.push(line);
    }
    var compact = [];
    for (var j = 0; j < cleaned.length; j += 1) {
      var curr = cleaned[j];
      if (!curr) {
        if (compact.length && compact[compact.length - 1] !== "") compact.push("");
        continue;
      }
      compact.push(curr);
    }
    while (compact.length && compact[0] === "") compact.shift();
    while (compact.length && compact[compact.length - 1] === "") compact.pop();
    if (!compact.length) return '<p class="assistant-paragraph">暂无回复</p>';

    var sections = [];
    var sectionTitle = "";
    var sectionLines = [];
    function flushSection() {
      if (!sectionTitle && !sectionLines.length) return;
      var content = sectionLines
        .map(function (ln) {
          return escapeHtml(String(ln || ""));
        })
        .join("<br />");
      sections.push({ title: sectionTitle, content: content });
      sectionTitle = "";
      sectionLines = [];
    }
    for (var k = 0; k < compact.length; k += 1) {
      var row = compact[k];
      if (!row) {
        flushSection();
        continue;
      }
      var m = row.match(
        /^(.*?)(结论|数据依据|建议|风险提示|后续动作|要点|小结|数据|依据)\s*[：:]\s*(.*)$/
      );
      if (m) {
        flushSection();
        var prefix = String(m[1] || "").trim();
        sectionTitle = (prefix ? prefix + " " : "") + m[2];
        if (m[3]) sectionLines.push(m[3]);
      } else {
        sectionLines.push(row);
      }
    }
    flushSection();
    if (!sections.length) {
      sections = compact.filter(Boolean).map(function (s) {
        return { title: "", content: escapeHtml(String(s || "")) };
      });
    }

    return sections
      .map(function (item) {
        var titleHtml = item.title
          ? '<span class="assistant-subtitle">' + escapeHtml(item.title + "：") + "</span>"
          : "";
        var body = item.content || "";
        return '<p class="assistant-paragraph">' + titleHtml + body + "</p>";
      })
      .join("");
  }

  function setMobileDatePreset(preset) {
    if (!hasPerm("canUseFilters")) return;
    var startInput = document.getElementById("startDate");
    var endInput = document.getElementById("endDate");
    if (!startInput || !endInput) return;
    var end = new Date();
    var start = new Date();
    if (preset === "last30d") {
      start.setDate(end.getDate() - 29);
    } else if (preset === "thisMonth") {
      start = new Date(end.getFullYear(), end.getMonth(), 1);
    } else {
      start.setDate(end.getDate() - 6);
    }
    startInput.value = ymd(start);
    endInput.value = ymd(end);
    applyDateRangeFromInputs();
  }

  function applyMobileUiActions(actions) {
    if (!Array.isArray(actions) || !actions.length) return;
    actions.forEach(function (action) {
      if (action && action.type === "mobile_scroll_to" && action.targetId) {
        var target = document.getElementById(String(action.targetId));
        if (target && !target.classList.contains("hidden")) {
          target.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }
      if (action && action.type === "mobile_set_date_preset") {
        setMobileDatePreset(String(action.preset || "last7d"));
      }
    });
  }

  async function sendChat() {
    const input = document.getElementById("chatInput");
    const btn = document.getElementById("chatSend");
    const t = input.value.trim();
    if (!t) return;
    input.value = "";
    chatMessages.push({ role: "user", text: t });
    var thinkingIdx = chatMessages.push({ role: "agent", text: "🤔 正在计算中，请稍候..." }) - 1;
    renderChat();
    btn.disabled = true;
    setButtonLoading(btn, true, "发送中...");
    try {
      const sync = await syncChatContext();
      if (!sync.ok) {
        if (thinkingIdx >= 0 && chatMessages[thinkingIdx]) chatMessages.splice(thinkingIdx, 1);
        chatMessages.push({ role: "err", text: sync.error || "同步失败" });
        renderChat();
        return;
      }
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ message: t, conversationId: agentConversationId }),
      });
      const data = await res.json().catch(function () { return {}; });
      if (!res.ok) {
        if (thinkingIdx >= 0 && chatMessages[thinkingIdx]) chatMessages.splice(thinkingIdx, 1);
        chatMessages.push({ role: "err", text: data.error || "请求失败" });
        showToast(data.error || "发送失败", "error");
      } else {
        if (thinkingIdx >= 0 && chatMessages[thinkingIdx]) chatMessages.splice(thinkingIdx, 1);
        chatMessages.push({ role: "agent", text: data.reply || "暂无回复" });
        applyMobileUiActions(data.uiActions);
        showToast("发送成功", "success");
      }
    } catch (e) {
      if (thinkingIdx >= 0 && chatMessages[thinkingIdx]) chatMessages.splice(thinkingIdx, 1);
      chatMessages.push({ role: "err", text: e.message || "网络异常" });
      showToast(e.message || "网络异常", "error");
    }
    setButtonLoading(btn, false);
    renderChat();
  }

  async function init() {
    const me = await fetch("/api/auth/me", { credentials: "same-origin" });
    if (!me.ok) {
      window.location.href = "/login?next=/mobile";
      return;
    }
    const meData = await me.json();
    user = meData.user;
    if (!user) {
      window.location.href = "/login?next=/mobile";
      return;
    }

    const roleMap = {
      admin: "管理员",
      manager: "经理",
      store_user: "门店用户",
      salesperson: "销售员",
      viewer: "查看者",
    };
    document.getElementById("userLabel").textContent =
      (user.displayName || user.username) + "（" + (roleMap[user.role] || user.role) + "）";

    document.getElementById("filterCard").style.display = hasPerm("canUseFilters") ? "" : "none";

    async function tryBindDingTalkUserId() {
      if (dingtalkBindTried) return;
      dingtalkBindTried = true;
      var ua = String(navigator.userAgent || "").toLowerCase();
      var inDingTalk = ua.includes("dingtalk");
      var ddObj = window.dd;
      if (!inDingTalk || !ddObj || !ddObj.runtime || !ddObj.runtime.permission || !ddObj.runtime.permission.requestAuthCode) {
        return;
      }
      try {
        const cfg = await fetchJson("/api/dingtalk/config");
        var corpId = String(cfg.corpId || "").trim();
        if (!corpId) {
          showToast("钉钉绑定未配置 corpId", "error");
          return;
        }
        ddObj.runtime.permission.requestAuthCode({
          corpId: corpId,
          onSuccess: async function (authRes) {
            try {
              var ar = authRes || {};
              var code = String(ar.code || ar.authCode || ar.auth_code || "").trim();
              if (!code) return;
              const bindRes = await fetchJson("/api/dingtalk/bind", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ code: code }),
              });
              if (bindRes && bindRes.ok) showToast("已绑定钉钉账号", "success");
            } catch (e) {
              showToast((e && e.message) || "钉钉绑定失败", "error");
            }
          },
          onFail: function () {
            showToast("钉钉授权失败", "error");
          },
        });
      } catch (e) {
        showToast((e && e.message) || "钉钉绑定失败", "error");
      }
    }
    tryBindDingTalkUserId().catch(function () {});

    document.getElementById("logoutBtn").addEventListener("click", async function () {
      await fetch("/api/auth/logout", { method: "POST", credentials: "same-origin" });
      window.location.href = "/login";
    });

    function wireFilterUi() {
      var applyBtn = document.getElementById("applyFiltersBtn");
      if (applyBtn && !applyBtn.dataset.wired) {
        applyBtn.dataset.wired = "1";
        applyBtn.addEventListener("click", async function () {
          if (applyBtn.disabled) return;
          var datePanelEl = document.getElementById("dateRangePanel");
          var dateTriggerEl = document.getElementById("dateRangeTrigger");
          if (datePanelEl) datePanelEl.classList.add("hidden");
          if (dateTriggerEl) dateTriggerEl.setAttribute("aria-expanded", "false");
          setButtonLoading(applyBtn, true, "加载中...");
          showInlineLoading("正在加载筛选结果...");
          if (hasPerm("canUseFilters")) {
            state.startDate = document.getElementById("startDate").value || "";
            state.endDate = document.getElementById("endDate").value || "";
            state.store = document.getElementById("storeSelect").value || "";
            updateDateRangeLabel();
          }
          try {
            await loadAllData();
            showToast("筛选已更新", "success");
          } catch (e) {
            showToast((e && e.message) || "加载失败", "error");
          } finally {
            hideInlineLoading();
            setButtonLoading(applyBtn, false);
          }
        });
      }
      var dateTrigger = document.getElementById("dateRangeTrigger");
      var datePanel = document.getElementById("dateRangePanel");
      var startDateInput = document.getElementById("startDate");
      var endDateInput = document.getElementById("endDate");
      var quick7dBtn = document.getElementById("quick7d");
      var quick30dBtn = document.getElementById("quick30d");
      var quickMonthBtn = document.getElementById("quickMonth");
      if (hasPerm("canUseFilters") && dateTrigger && datePanel && startDateInput && endDateInput && !dateTrigger.dataset.wired) {
        dateTrigger.dataset.wired = "1";
        dateTrigger.addEventListener("click", function () {
          datePanel.classList.toggle("hidden");
          var open = !datePanel.classList.contains("hidden");
          dateTrigger.setAttribute("aria-expanded", open ? "true" : "false");
          if (open) {
            startDateInput.value = state.startDate;
            endDateInput.value = state.endDate;
          }
        });
        startDateInput.addEventListener("change", applyDateRangeFromInputs);
        endDateInput.addEventListener("change", applyDateRangeFromInputs);

        if (quick7dBtn) {
          quick7dBtn.addEventListener("click", function () {
            var end = new Date();
            var start = new Date();
            start.setDate(end.getDate() - 6);
            startDateInput.value = ymd(start);
            endDateInput.value = ymd(end);
            applyDateRangeFromInputs();
          });
        }
        if (quick30dBtn) {
          quick30dBtn.addEventListener("click", function () {
            var end = new Date();
            var start = new Date();
            start.setDate(end.getDate() - 29);
            startDateInput.value = ymd(start);
            endDateInput.value = ymd(end);
            applyDateRangeFromInputs();
          });
        }
        if (quickMonthBtn) {
          quickMonthBtn.addEventListener("click", function () {
            var end = new Date();
            var start = new Date(end.getFullYear(), end.getMonth(), 1);
            startDateInput.value = ymd(start);
            endDateInput.value = ymd(end);
            applyDateRangeFromInputs();
          });
        }
      }
    }

    function wireSleepFilterUi() {
      var btn = document.getElementById("sleepFilterApplyBtn");
      if (!btn || btn.dataset.wired) return;
      btn.dataset.wired = "1";
      btn.addEventListener("click", async function () {
        readSleepFilterFromInputs();
        setButtonLoading(btn, true, "加载中...");
        showInlineLoading("正在加载沉睡会员...");
        try {
          var filterBase = { startDate: state.startDate, endDate: state.endDate };
          var storeParam = state.store ? { stores: [state.store] } : {};
          var sleeping = await fetchSleepingPage(filterBase, storeParam, SLEEP_INITIAL_LIMIT, 0);
          var sleepRows = Array.isArray(sleeping && sleeping.rows)
            ? sleeping.rows
            : Array.isArray(sleeping && sleeping.sleepList)
              ? sleeping.sleepList
              : [];
          sleepPagingState.rows = sleepRows.slice(0, SLEEP_MAX_ROWS);
          sleepPagingState.hasMore = sleepRows.length === SLEEP_INITIAL_LIMIT;
          sleepPagingState.filterBase = Object.assign({}, filterBase);
          sleepPagingState.storeParam = Object.assign({}, storeParam);
          sleepPagingState.sleepSummary = Array.isArray(sleeping && sleeping.sleepSummary) ? sleeping.sleepSummary : [];
          renderSleepingSection();
          cacheForChat.sleeping = {
            rows: (sleepPagingState.rows || []).slice(),
            sleepList: (sleepPagingState.rows || []).slice(),
            sleepSummary: (sleepPagingState.sleepSummary || []).slice(),
          };
          showToast("沉睡会员筛选已更新", "success");
        } catch (e) {
          showToast((e && e.message) || "加载失败", "error");
        } finally {
          hideInlineLoading();
          setButtonLoading(btn, false);
        }
      });
    }

    wireFilterUi();
    wireSleepFilterUi();

    wireDraggableFab();

    datasetId = await loadLatestDataset();
    if (!datasetId) {
      updateDateRangeLabel();
      await loadAllData();
      wireChat();
      return;
    }

    if (hasPerm("canUseFilters")) {
      const opt = await loadFilterOptions().catch(function () { return null; });
      const dr = opt && opt.options ? opt.options.dateRange : null;
      dateBounds.min = (dr && dr.minDate) || "";
      dateBounds.max = (dr && dr.maxDate) || "";
      state.startDate = dateBounds.min;
      state.endDate = dateBounds.max;
      document.getElementById("startDate").value = state.startDate;
      document.getElementById("endDate").value = state.endDate;
      updateDateRangeLabel();
      debugDatasetConsistency("initDefaultDateRange", {
        dateBoundsMin: dateBounds.min || "",
        dateBoundsMax: dateBounds.max || "",
        appliedStartDate: state.startDate || "",
        appliedEndDate: state.endDate || "",
      });
      populateStoreSelect((opt && opt.options && opt.options.stores) || []);
    } else {
      document.getElementById("startDate").disabled = true;
      document.getElementById("endDate").disabled = true;
      document.getElementById("storeSelect").disabled = true;
    }

    await loadAllData();
    wireChat();
  }

  function wireChat() {
    const fab = document.getElementById("chatFab");
    const panel = document.getElementById("chatPanel");
    const close = document.getElementById("chatClose");
    const resetBtn = document.getElementById("chatReset");
    const send = document.getElementById("chatSend");
    const input = document.getElementById("chatInput");
    if (!fab || fab.dataset.chatWired) return;
    fab.dataset.chatWired = "1";
    if (hasPerm("canUseAgentChat")) {
      void (async function hydrateMobileChatHistory() {
        try {
          var res = await fetch(
            "/api/chat/history?conversationId=" + encodeURIComponent(agentConversationId),
            { credentials: "same-origin" }
          );
          if (!res.ok) return;
          var payload = await res.json().catch(function () { return {}; });
          var list = Array.isArray(payload.messages) ? payload.messages : [];
          if (!list.length) return;
          chatMessages.length = 0;
          chatMessages.push({
            role: "agent",
            text: "已从服务器恢复本设备的最近对话（在会话保留时间内有效）；也可点「重置对话」开启新会话。",
          });
          list.forEach(function (m) {
            if (!m || typeof m !== "object") return;
            if (m.role === "user") chatMessages.push({ role: "user", text: String(m.content || "") });
            else if (m.role === "assistant") chatMessages.push({ role: "agent", text: String(m.content || "") });
          });
          renderChat();
        } catch (_err) {}
      })();
    }
    fab.addEventListener("click", function (e) {
      if (Date.now() < fabIgnoreClickUntil) {
        e.preventDefault();
        return;
      }
      panel.classList.add("open");
    });
    close.addEventListener("click", function () {
      panel.classList.remove("open");
    });
    if (resetBtn) {
      resetBtn.addEventListener("click", async function () {
        var prevId = agentConversationId;
        try {
          await fetch("/api/chat/reset", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "same-origin",
            body: JSON.stringify({ conversationId: prevId }),
          });
        } catch (_e) {
          showToast("重置失败", "error");
          return;
        }
        agentConversationId = mintAgentConversationId();
        chatMessages.length = 0;
        chatMessages.push({ role: "agent", text: "对话已重置，已开启新会话并与当前筛选范围对齐。" });
        renderChat();
        showToast("对话已重置", "success");
      });
    }
    send.addEventListener("click", sendChat);
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") sendChat();
    });
  }

  function wireDraggableFab() {
    var fab = document.getElementById("chatFab");
    if (!fab || fab.dataset.dragWired) return;
    fab.dataset.dragWired = "1";
    const key = "mobileAiFabPosition";
    var dragging = false;
    var moved = false;
    var startX = 0;
    var startY = 0;
    var originLeft = 0;
    var originTop = 0;

    function clampPos(left, top) {
      const w = fab.offsetWidth || 56;
      const h = fab.offsetHeight || 56;
      const maxLeft = Math.max(0, window.innerWidth - w);
      const maxTop = Math.max(0, window.innerHeight - h);
      return {
        left: Math.max(0, Math.min(maxLeft, left)),
        top: Math.max(0, Math.min(maxTop, top)),
      };
    }
    function applyPos(left, top) {
      const p = clampPos(left, top);
      fab.style.left = p.left + "px";
      fab.style.top = p.top + "px";
      fab.style.right = "auto";
      fab.style.bottom = "auto";
      return p;
    }
    function savePos(p) {
      try { localStorage.setItem(key, JSON.stringify({ left: p.left, top: p.top })); } catch (_e) {}
    }
    function restorePos() {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return;
        const p = JSON.parse(raw);
        if (!p || !Number.isFinite(Number(p.left)) || !Number.isFinite(Number(p.top))) return;
        applyPos(Number(p.left), Number(p.top));
      } catch (_e) {}
    }

    restorePos();
    window.addEventListener("resize", function () {
      if (!fab.style.left || !fab.style.top) return;
      const left = Number(String(fab.style.left || "0").replace("px", "")) || 0;
      const top = Number(String(fab.style.top || "0").replace("px", "")) || 0;
      const p = applyPos(left, top);
      savePos(p);
    });

    fab.addEventListener("pointerdown", function (e) {
      dragging = true;
      moved = false;
      startX = e.clientX;
      startY = e.clientY;
      const rect = fab.getBoundingClientRect();
      originLeft = rect.left;
      originTop = rect.top;
      fab.setPointerCapture(e.pointerId);
    });
    fab.addEventListener("pointermove", function (e) {
      if (!dragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      if (Math.abs(dx) > 6 || Math.abs(dy) > 6) moved = true;
      if (!moved) return;
      const p = applyPos(originLeft + dx, originTop + dy);
      savePos(p);
    });
    fab.addEventListener("pointerup", function (e) {
      if (!dragging) return;
      dragging = false;
      fab.releasePointerCapture(e.pointerId);
      if (moved) fabIgnoreClickUntil = Date.now() + 220;
    });
    fab.addEventListener("pointercancel", function () { dragging = false; });
  }

  init().catch(function (e) {
    console.error(e);
    showBanner("warn", e.message || "加载失败");
  });
})();
