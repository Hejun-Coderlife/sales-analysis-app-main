<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>赫眉经营助手 - 数据看板（手机版）</title>
  <link rel="stylesheet" href="/frontend/src/styles/galaxy-background.css" />
  <style>
    :root {
      --bg: #02030f;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 12px 14px 96px;
      padding-bottom: calc(96px + var(--safe-bottom));
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow-x: hidden;
    }
    header.top {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }
    h1 { margin: 0; font-size: 1.15rem; font-weight: 700; color: #f8fbff; text-shadow: 0 0 18px rgba(105,105,159,.35), 0 2px 10px rgba(0,0,0,.35); }
    .sub { margin: 4px 0 0; font-size: 12px; color: #d7def2; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .btn {
      border: none;
      border-radius: 10px;
      min-height: 38px;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-light { background: #e5e7eb; color: #111827; }
    .banner {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 14px;
      line-height: 1.45;
    }
    .banner-warn { background: #fef3c7; color: #92400e; border: 1px solid #fbbf24; }
    .banner-info { background: #eff6ff; color: #1e40af; border: 1px solid #93c5fd; }
    .hidden { display: none !important; }
    .inline-loading {
      margin: 0 0 10px;
      padding: 8px 10px;
      border-radius: 10px;
      background: #eef2ff;
      color: #1e40af;
      font-size: 12px;
      border: 1px solid #c7d2fe;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 4px 14px rgba(2, 6, 23, 0.06);
    }
    .card h2 { margin: 0 0 10px; font-size: 15px; font-weight: 700; }
    .filters label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .filter-full { width: 100%; max-width: 100%; }
    .date-range-trigger {
      width: 100%;
      max-width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }
    .date-range-trigger:active { filter: brightness(0.97); }
    .date-range-trigger .chev { flex-shrink: 0; font-size: 10px; color: var(--muted); }
    .date-range-lines { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .date-range-lines .hint { font-size: 11px; font-weight: 500; color: var(--muted); }
    .date-range-lines .val { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.35; word-break: break-all; }
    .date-range-panel {
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #f9fafb;
    }
    .date-range-panel .row { margin-bottom: 10px; }
    .date-range-panel .row:last-of-type { margin-bottom: 0; }
    .date-range-panel label { margin-bottom: 6px; }
    .date-range-panel input[type="date"] {
      width: 100%;
      min-height: 44px;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 12px;
      background: #fff;
      color: var(--text);
      box-sizing: border-box;
      appearance: none;
      -webkit-appearance: none;
      font-variant-numeric: tabular-nums;
    }
    .date-quick {
      margin: 10px 0 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .quick-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: #1f2937;
      border-radius: 999px;
      min-height: 32px;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .quick-btn:active { filter: brightness(0.96); }
    .filters select {
      width: 100%;
      max-width: 100%;
      min-height: 44px;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      box-sizing: border-box;
    }
    .rank-empty-msg {
      margin: 4px 0 0;
      padding: 16px 8px;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }
    .rank-detail-wrap { margin-top: 2px; }
    .rank-chart-box {
      position: relative;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
    }
    .rank-chart-box canvas { display: block; max-width: 100%; }
    .rank-list.ol { margin-top: 10px; padding-top: 6px; border-top: 1px solid var(--border); }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .kpi {
      background: #f9fafb;
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
    }
    .kpi .val { font-size: 15px; font-weight: 700; word-break: break-all; }
    .kpi .lab { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .mini {
      background: #f9fafb;
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
    }
    .mini .t { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
    .ol { margin: 0; padding: 0; list-style: none; counter-reset: r; }
    .ol li {
      counter-increment: r;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .ol li:last-child { border-bottom: none; }
    .ol li::before {
      content: counter(r) ".";
      flex: 0 0 22px;
      color: var(--muted);
      font-weight: 600;
    }
    .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .muted { color: var(--muted); font-size: 12px; }
    .perm-tip { font-size: 13px; color: var(--muted); padding: 8px 0; }
    #chatFab {
      position: fixed;
      right: 16px;
      bottom: calc(16px + var(--safe-bottom));
      z-index: 9998;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid rgba(37, 99, 235, 0.35);
      background: #fff url("favicon.png") center/70% no-repeat;
      box-shadow: 0 8px 24px rgba(2, 6, 23, 0.15);
      cursor: pointer;
      padding: 0;
    }
    #chatPanel {
      display: none;
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(12px + var(--safe-bottom));
      max-height: min(64vh, 520px);
      z-index: 9999;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      flex-direction: column;
      box-shadow: 0 12px 40px rgba(2, 6, 23, 0.18);
    }
    #chatPanel.open { display: flex; }
    .chat-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 14px;
    }
    .chat-body { flex: 1; overflow: auto; padding: 10px 12px; font-size: 14px; }
    .chat-msg { margin-bottom: 10px; line-height: 1.45; word-break: break-word; }
    .chat-msg.user { text-align: right; color: #1d4ed8; }
    .chat-msg.agent { text-align: left; color: #111827; }
    .chat-msg.err { color: #b91c1c; }
    .chat-foot { display: flex; gap: 8px; padding: 10px; border-top: 1px solid var(--border); }
    .chat-foot input { flex: 1; min-height: 42px; font-size: 16px; border-radius: 10px; border: 1px solid var(--border); padding: 0 10px; }
    #toast {
      position: fixed;
      left: 50%;
      top: 14px;
      transform: translateX(-50%);
      z-index: 10001;
      display: none;
      max-width: calc(100vw - 32px);
      background: #111827;
      color: #fff;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>
<body>
  <header class="top">
    <div>
      <h1>赫眉经营助手</h1>
      <p class="sub">数据看板（手机版）</p>
      <p class="sub" style="margin-top:2px" id="userLabel">加载中…</p>
    </div>
    <div class="actions">
      <button type="button" class="btn btn-light" id="logoutBtn">退出登录</button>
    </div>
  </header>

  <div id="globalBanner" class="banner hidden"></div>
  <div id="inlineLoading" class="inline-loading hidden">正在刷新数据...</div>

  <section class="card filters" id="filterCard">
    <h2>筛选</h2>
    <div class="filter-full">
      <label for="dateRangeTrigger">日期范围</label>
      <button type="button" class="date-range-trigger" id="dateRangeTrigger" aria-expanded="false" aria-controls="dateRangePanel">
        <span class="date-range-lines">
          <span class="hint">当前区间</span>
          <span class="val" id="dateRangeLabel">—</span>
        </span>
        <span class="chev" aria-hidden="true">▼</span>
      </button>
      <div class="date-range-panel hidden" id="dateRangePanel" role="region" aria-label="选择日期">
        <div class="row">
          <label for="startDate">开始日期</label>
          <input type="date" id="startDate" />
        </div>
        <div class="row">
          <label for="endDate">结束日期</label>
          <input type="date" id="endDate" />
        </div>
        <div class="date-quick">
          <button type="button" class="quick-btn" id="quick7d">近7天</button>
          <button type="button" class="quick-btn" id="quick30d">近30天</button>
          <button type="button" class="quick-btn" id="quickMonth">本月</button>
        </div>
      </div>
    </div>
    <div style="margin-top:12px">
      <label for="storeSelect">门店</label>
      <select id="storeSelect"></select>
    </div>
    <button type="button" class="btn btn-primary" style="margin-top:12px;width:100%" id="applyFiltersBtn">应用筛选</button>
  </section>

  <section class="card" id="notifEntryCard">
    <h2>消息 / 提醒</h2>
    <p class="muted" style="margin:0 0 10px">查看应用内提醒与待办消息。</p>
    <div style="display:flex;gap:8px;align-items:center;justify-content:space-between;">
      <button type="button" class="btn btn-light" id="openNotifBtn" style="flex:1">打开消息中心</button>
      <span id="notifUnreadBadge" class="muted" style="font-weight:700;">未读 0</span>
    </div>
  </section>

  <section class="card hidden" id="coreKpiCard">
    <h2>核心 KPI</h2>
    <div class="kpi-grid" id="coreKpis"></div>
  </section>

  <section class="card hidden" id="overviewCard">
    <h2>今日 / 本月概览</h2>
    <div class="mini-grid" id="todayMonth"></div>
  </section>

  <section class="card hidden" id="rankStoresCard">
    <h2>门店排行 Top 10</h2>
    <p class="rank-empty-msg hidden" id="rankStoresEmptyMsg">暂无可展示的排行数据</p>
    <div class="rank-detail-wrap hidden" id="rankStoresDetail">
      <div class="rank-chart-box">
        <canvas id="chartStores"></canvas>
      </div>
      <ol class="ol rank-list" id="listStores"></ol>
    </div>
  </section>
  <section class="card hidden" id="rankSalesCard">
    <h2>销售员排行 Top 10</h2>
    <p class="rank-empty-msg hidden" id="rankSalesEmptyMsg">暂无可展示的排行数据</p>
    <div class="rank-detail-wrap hidden" id="rankSalesDetail">
      <div class="rank-chart-box">
        <canvas id="chartSales"></canvas>
      </div>
      <ol class="ol rank-list" id="listSales"></ol>
    </div>
  </section>
  <section class="card hidden" id="rankProductsCard">
    <h2>商品排行 Top 10</h2>
    <p class="rank-empty-msg hidden" id="rankProductsEmptyMsg">暂无可展示的排行数据</p>
    <div class="rank-detail-wrap hidden" id="rankProductsDetail">
      <div class="rank-chart-box">
        <canvas id="chartProducts"></canvas>
      </div>
      <ol class="ol rank-list" id="listProducts"></ol>
    </div>
  </section>

  <section class="card hidden" id="memberCard">
    <h2>会员维护摘要</h2>
    <div id="memberSummary"></div>
  </section>

  <section class="card hidden" id="sleepCard">
    <h2>沉睡会员摘要</h2>
    <div id="sleepSummary"></div>
  </section>

  <section class="card hidden" id="agentCard">
    <h2>数据助手</h2>
    <p class="muted" style="margin:0 0 10px">点击下方浮动按钮打开对话，数据与权限与当前账号一致。</p>
  </section>

  <button type="button" id="chatFab" aria-label="打开数据助手"></button>
  <div id="chatPanel">
    <div class="chat-head">
      <span>数据助手</span>
      <button type="button" class="btn btn-light" id="chatClose" style="min-height:32px;padding:0 10px">关闭</button>
    </div>
    <div class="chat-body" id="chatMessages"></div>
    <div class="chat-foot">
      <input type="text" id="chatInput" placeholder="请输入你的问题…" autocomplete="off" />
      <button type="button" class="btn btn-primary" id="chatSend">发送</button>
    </div>
  </div>

  <div id="notifPanel" style="display:none;position:fixed;left:12px;right:12px;top:12px;bottom:calc(12px + var(--safe-bottom));z-index:10000;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 12px 40px rgba(2, 6, 23, 0.18);overflow:hidden;flex-direction:column;">
    <div class="chat-head">
      <span>消息中心</span>
      <button type="button" class="btn btn-light" id="notifClose" style="min-height:32px;padding:0 10px">关闭</button>
    </div>
    <div class="chat-body" id="notifList" style="padding:10px 12px;"></div>
  </div>
  <div id="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/frontend/src/visual/galaxy-background.js"></script>
  <script>
(function () {
  window.initGalaxyBackground({ includeEarth: true, mapAssistantButton: true });

  const NO_PERM_DATA = "当前账号暂无可查看数据，请联系管理员配置权限。";
  const NO_IMPORT = "暂无数据，请管理员先在后台导入 Excel。";
  const MOD_FORBIDDEN = "暂无权限查看此模块";

  const sleepLabels = {
    "Analysis Cutoff Date": "评估截止日",
    "Sleeping Members": "沉睡会员人数",
    "Sleeping Members Historical Spend": "沉睡会员历史消费额",
    "A-Class Members": "A 类会员人数",
    "A-Class Historical Spend": "A 类历史消费额",
    "B-Class Members": "B 类会员人数",
    "C-Class Members": "C 类会员人数",
  };

  let user = null;
  let datasetId = null;
  let dateBounds = { min: "", max: "" };
  let state = {
    startDate: "",
    endDate: "",
    store: "",
  };
  let dateRefreshTimer = null;
  let toastTimer = null;

  const conversationId = "mobile-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
  const chatMessages = [];
  let notifCache = { unread: 0, rows: [] };

  const rankCharts = { stores: null, sales: null, products: null };
  const RANK_BAR_BG = "rgba(118, 144, 243, 0.78)";
  const RANK_BAR_BORDER = "#7690f3";

  function destroyRankChart(key) {
    if (rankCharts[key]) {
      rankCharts[key].destroy();
      rankCharts[key] = null;
    }
  }

  function renderRankHorizontalBar(key, canvasId, labels, values, fmtVal) {
    const canvas = document.getElementById(canvasId);
    const box = canvas && canvas.parentElement;
    destroyRankChart(key);
    if (!labels.length || !canvas || !box) {
      return;
    }
    const n = labels.length;
    box.style.height = Math.min(320, Math.max(140, n * 26 + 48)) + "px";

    rankCharts[key] = new Chart(canvas, {
      type: "bar",
      data: {
        labels: labels.slice(),
        datasets: [
          {
            label: "数值",
            data: values.slice(),
            backgroundColor: RANK_BAR_BG,
            borderColor: RANK_BAR_BORDER,
            borderWidth: 0,
            borderRadius: { topRight: 8, bottomRight: 8, topLeft: 0, bottomLeft: 0 },
            borderSkipped: false,
            maxBarThickness: 24,
          },
        ],
      },
      options: {
        indexAxis: "y",
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        layout: { padding: { right: 6 } },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: function (items) {
                const i = items[0] ? items[0].dataIndex : 0;
                return String(labels[i] != null ? labels[i] : "");
              },
              label: function (ctx) {
                return fmtVal(Number(ctx.raw || 0));
              },
            },
          },
        },
        scales: {
          x: {
            grid: { color: "rgba(229, 231, 235, 0.95)", drawBorder: false },
            ticks: {
              font: { size: 10 },
              maxTicksLimit: 6,
            },
            border: { display: false },
          },
          y: {
            grid: { display: false },
            ticks: {
              font: { size: 11 },
              autoSkip: false,
              callback: function (val) {
                var s = String(val != null ? val : "");
                return s.length > 12 ? s.slice(0, 11) + "…" : s;
              },
            },
            border: { display: false },
          },
        },
      },
    });
  }

  function hasPerm(key) {
    return Boolean(user && user.permissions && user.permissions[key]);
  }

  function showBanner(kind, text) {
    const el = document.getElementById("globalBanner");
    el.className = "banner " + (kind === "warn" ? "banner-warn" : "banner-info");
    el.textContent = text;
    el.classList.remove("hidden");
  }
  function showToast(text, type) {
    var toast = document.getElementById("toast");
    if (!toast) return;
    toast.textContent = text || "";
    toast.style.background = type === "error" ? "#b91c1c" : (type === "success" ? "#166534" : "#111827");
    toast.style.display = "block";
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toast.style.display = "none"; }, 2000);
  }
  function setButtonLoading(btn, isLoading, loadingText) {
    if (!btn) return;
    if (!btn.dataset.originText) btn.dataset.originText = btn.textContent || "";
    btn.disabled = !!isLoading;
    btn.style.opacity = isLoading ? "0.75" : "";
    btn.textContent = isLoading ? (loadingText || "加载中...") : btn.dataset.originText;
  }
  function showInlineLoading(message) {
    var el = document.getElementById("inlineLoading");
    if (!el) return;
    el.textContent = message || "正在刷新数据...";
    el.classList.remove("hidden");
  }
  function hideInlineLoading() {
    var el = document.getElementById("inlineLoading");
    if (!el) return;
    el.classList.add("hidden");
  }
  function hideBanner() {
    document.getElementById("globalBanner").classList.add("hidden");
  }

  function fmtMoney(n) {
    const x = Number(n) || 0;
    return x.toLocaleString("zh-CN", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " 元";
  }
  function fmtInt(n) {
    return String(Math.round(Number(n) || 0));
  }

  function qs(obj) {
    const u = new URLSearchParams();
    for (const [k, v] of Object.entries(obj)) {
      if (v == null || v === "") continue;
      if (Array.isArray(v)) {
        if (v.length) u.set(k, v.join(","));
      } else {
        u.set(k, String(v));
      }
    }
    return u.toString();
  }

  async function fetchJson(url, opt) {
    const res = await fetch(url, { credentials: "same-origin", ...opt });
    const data = await res.json().catch(function () { return {}; });
    if (!res.ok) throw new Error(data.error || "HTTP " + res.status);
    return data;
  }

  function setSectionVisible(id, show) {
    document.getElementById(id).classList.toggle("hidden", !show);
  }

  function renderKpiGrid(containerId, kpis) {
    const el = document.getElementById(containerId);
    el.innerHTML =
      '<div class="kpi"><div class="val">' +
      fmtMoney(kpis.totalSales) +
      '</div><div class="lab">销售额</div></div>' +
      '<div class="kpi"><div class="val">' +
      fmtInt(kpis.totalOrders) +
      '</div><div class="lab">订单数</div></div>' +
      '<div class="kpi"><div class="val">' +
      fmtInt(kpis.uniqueMembers) +
      '</div><div class="lab">会员数</div></div>';
  }

  function renderOl(id, rows, fmtVal) {
    const el = document.getElementById(id);
    if (!rows.length) {
      el.innerHTML = "";
      return;
    }
    el.innerHTML = rows
      .map(function (r) {
        return (
          '<li><span class="name">' +
          escapeHtml(r.name) +
          "</span><span>" +
          fmtVal(r.val) +
          "</span></li>"
        );
      })
      .join("");
  }

  function escapeHtml(s) {
    return String(s != null ? s : "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function ymd(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
  }

  function formatDateZh(dateString) {
    if (!dateString || !/^\d{4}-\d{2}-\d{2}$/.test(dateString)) {
      return "—";
    }
    var p = dateString.split("-");
    return p[0] + "年" + String(Number(p[1])) + "月" + String(Number(p[2])) + "日";
  }

  function updateDateRangeLabel() {
    var el = document.getElementById("dateRangeLabel");
    if (!el) return;
    if (!state.startDate || !state.endDate) {
      el.textContent = "请选择日期范围";
      return;
    }
    el.textContent = formatDateZh(state.startDate) + " 至 " + formatDateZh(state.endDate);
  }

  function queueDateRefresh() {
    if (dateRefreshTimer) clearTimeout(dateRefreshTimer);
    dateRefreshTimer = setTimeout(async function () {
      if (!datasetId) return;
      showInlineLoading("正在刷新数据...");
      try {
        await loadAllData();
      } catch (e) {
        showToast((e && e.message) || "刷新失败", "error");
      } finally {
        hideInlineLoading();
      }
    }, 300);
  }

  function applyDateRangeFromInputs() {
    var s = document.getElementById("startDate").value || "";
    var e = document.getElementById("endDate").value || "";
    if (!s || !e) return;
    if (s > e) {
      showBanner("warn", "开始日期不能晚于结束日期");
      return;
    }
    state.startDate = s;
    state.endDate = e;
    updateDateRangeLabel();
    hideBanner();
    queueDateRefresh();
  }

  async function loadLatestDataset() {
    const data = await fetchJson("/api/v2/datasets/latest");
    return data.dataset && data.dataset.dataset_id ? String(data.dataset.dataset_id) : null;
  }

  async function loadFilterOptions() {
    if (!datasetId || !hasPerm("canUseFilters")) return null;
    const q = qs({ startDate: state.startDate, endDate: state.endDate });
    const url = "/api/v2/datasets/" + encodeURIComponent(datasetId) + "/filters/options" + (q ? "?" + q : "");
    return fetchJson(url);
  }

  function populateStoreSelect(stores) {
    const sel = document.getElementById("storeSelect");
    const cur = state.store;
    sel.innerHTML = '<option value="">全部门店</option>';
    (stores || []).forEach(function (s) {
            const o = document.createElement("option");
            o.value = s;
            o.textContent = s;
            sel.appendChild(o);
          });
    if (cur && stores && stores.indexOf(cur) >= 0) sel.value = cur;
    else sel.value = "";
  }

  async function fetchKpis(extra) {
    if (!datasetId || !hasPerm("canViewKpi")) return null;
    const f = {
      startDate: extra.startDate != null ? extra.startDate : state.startDate,
      endDate: extra.endDate != null ? extra.endDate : state.endDate,
      stores: state.store ? [state.store] : [],
    };
    const q = qs(f);
    const url = "/api/v2/datasets/" + encodeURIComponent(datasetId) + "/kpis?" + q;
    const data = await fetchJson(url);
    return data.kpis || null;
  }

  async function fetchRank(path, perm) {
    if (!datasetId || !hasPerm(perm)) return [];
    const f = { startDate: state.startDate, endDate: state.endDate, stores: state.store ? [state.store] : [] };
    const q = qs(f) + "&limit=10&offset=0";
    const url =
      "/api/v2/datasets/" + encodeURIComponent(datasetId) + path + (q ? "?" + q : "");
    const data = await fetchJson(url);
    return data.rows || [];
  }

  async function loadAllData() {
    hideBanner();
    if (!datasetId) {
      showBanner("warn", NO_IMPORT);
      destroyRankChart("stores");
      destroyRankChart("sales");
      destroyRankChart("products");
      [
        "coreKpiCard",
        "overviewCard",
        "rankStoresCard",
        "rankSalesCard",
        "rankProductsCard",
        "memberCard",
        "sleepCard",
      ].forEach(function (id) { setSectionVisible(id, false); });
      setSectionVisible("agentCard", hasPerm("canUseAgentChat"));
      document.getElementById("chatFab").style.display = hasPerm("canUseAgentChat") ? "block" : "none";
      return;
    }

    const filterBase = { startDate: state.startDate, endDate: state.endDate };
    const storeParam = state.store ? { stores: [state.store] } : {};

    let coreKpis = null;
    let todayK = null;
    let monthK = null;
    let stores = [];
    let sales = [];
    let products = [];
    let members = [];
    let sleeping = null;

    const today = ymd(new Date());
    const now = new Date();
    const monthStart = ymd(new Date(now.getFullYear(), now.getMonth(), 1));

    try {
      if (hasPerm("canViewKpi")) {
        coreKpis = await fetchKpis({});
        todayK = await fetchKpis({ startDate: today, endDate: today });
        monthK = await fetchKpis({ startDate: monthStart, endDate: today });
      }
    } catch (e) {
      console.warn(e);
    }

    try {
      stores = await fetchRank("/rankings/stores", "canViewStoreRanking");
    } catch (e) {
      stores = [];
    }
    try {
      sales = await fetchRank("/rankings/salespeople", "canViewSalespersonRanking");
    } catch (e) {
      sales = [];
    }
    try {
      products = await fetchRank("/rankings/products", "canViewProductRanking");
    } catch (e) {
      products = [];
    }
    try {
      if (hasPerm("canViewMemberAnalysis")) {
        const q =
          qs(Object.assign({}, filterBase, storeParam, { limit: 20, offset: 0 })) || "";
        const url =
          "/api/v2/datasets/" +
          encodeURIComponent(datasetId) +
          "/members/top?" +
          q;
        const data = await fetchJson(url);
        members = data.rows || [];
      }
    } catch (e) {
      members = [];
    }
    try {
      if (hasPerm("canViewSleepingMembers")) {
        const q =
          qs(
            Object.assign(
              {},
              filterBase,
              storeParam,
              {
                sleepDays: 90,
                sleepMinOrders: 2,
                sleepMinAmount: 1000,
                aclassMinAmount: 3000,
                aclassMinOrders: 5,
                analysisDate: state.endDate || "",
                limit: 20,
                offset: 0,
              }
            )
          ) || "";
        const url =
          "/api/v2/datasets/" +
          encodeURIComponent(datasetId) +
          "/members/sleeping?" +
          q;
        sleeping = await fetchJson(url);
      }
    } catch (e) {
      sleeping = null;
    }

    const totalRows = coreKpis ? Number(coreKpis.totalRows || 0) : 0;
    const fullRange =
      Boolean(dateBounds.min) &&
      Boolean(dateBounds.max) &&
      state.startDate === dateBounds.min &&
      state.endDate === dateBounds.max;
    if (totalRows === 0 && fullRange && datasetId) {
      showBanner("warn", NO_PERM_DATA);
    }

    if (hasPerm("canViewKpi") && coreKpis) {
      setSectionVisible("coreKpiCard", true);
      renderKpiGrid("coreKpis", {
        totalSales: coreKpis.totalsales !== undefined ? coreKpis.totalsales : coreKpis.totalSales,
        totalOrders: coreKpis.totalorders !== undefined ? coreKpis.totalorders : coreKpis.totalOrders,
        uniqueMembers: coreKpis.uniqueMembers != null ? coreKpis.uniqueMembers : 0,
      });
    } else {
      setSectionVisible("coreKpiCard", false);
      if (!hasPerm("canViewKpi")) {
        document.getElementById("coreKpis").innerHTML = '<p class="perm-tip">' + MOD_FORBIDDEN + "</p>";
        setSectionVisible("coreKpiCard", true);
      }
    }

    if (hasPerm("canViewKpi") && (todayK || monthK)) {
      setSectionVisible("overviewCard", true);
      const tEl = document.getElementById("todayMonth");
      const tSales = todayK
        ? Number(
            todayK.totalsales !== undefined && todayK.totalsales !== null
              ? todayK.totalsales
              : todayK.totalSales || 0
          )
        : 0;
      const tOrd = todayK
        ? Number(
            todayK.totalorders !== undefined && todayK.totalorders !== null
              ? todayK.totalorders
              : todayK.totalOrders || 0
          )
        : 0;
      const mSales = monthK
        ? Number(
            monthK.totalsales !== undefined && monthK.totalsales !== null
              ? monthK.totalsales
              : monthK.totalSales || 0
          )
        : 0;
      const mOrd = monthK
        ? Number(
            monthK.totalorders !== undefined && monthK.totalorders !== null
              ? monthK.totalorders
              : monthK.totalOrders || 0
          )
        : 0;
      tEl.innerHTML =
        '<div class="mini"><div class="t">今日销售额</div><div>' +
        fmtMoney(tSales) +
        '</div><div class="t" style="margin-top:6px">今日订单</div><div>' +
        fmtInt(tOrd) +
        "</div></div>" +
        '<div class="mini"><div class="t">本月销售额（截至今日）</div><div>' +
        fmtMoney(mSales) +
        '</div><div class="t" style="margin-top:6px">本月订单</div><div>' +
        fmtInt(mOrd) +
        "</div></div>";
    } else {
      setSectionVisible("overviewCard", false);
    }

    if (hasPerm("canViewStoreRanking")) {
      setSectionVisible("rankStoresCard", true);
      var storeRows = stores.map(function (r) {
        return { name: r.store, val: Number(r.performance || 0) };
      });
      var storeLabels = storeRows.map(function (r) { return r.name; });
      var storeVals = storeRows.map(function (r) { return r.val; });
      if (!storeRows.length) {
        destroyRankChart("stores");
        document.getElementById("rankStoresEmptyMsg").classList.remove("hidden");
        document.getElementById("rankStoresDetail").classList.add("hidden");
        document.getElementById("listStores").innerHTML = "";
      } else {
        document.getElementById("rankStoresEmptyMsg").classList.add("hidden");
        document.getElementById("rankStoresDetail").classList.remove("hidden");
        renderRankHorizontalBar("stores", "chartStores", storeLabels, storeVals, function (v) {
          return fmtMoney(v);
        });
        renderOl("listStores", storeRows, function (v) { return fmtMoney(v); });
      }
    } else {
      destroyRankChart("stores");
      setSectionVisible("rankStoresCard", false);
    }

    if (hasPerm("canViewSalespersonRanking")) {
      setSectionVisible("rankSalesCard", true);
      var salesRows = sales.map(function (r) {
        return { name: r.salesperson, val: Number(r.performance || 0) };
      });
      var salesLabels = salesRows.map(function (r) { return r.name; });
      var salesVals = salesRows.map(function (r) { return r.val; });
      if (!salesRows.length) {
        destroyRankChart("sales");
        document.getElementById("rankSalesEmptyMsg").classList.remove("hidden");
        document.getElementById("rankSalesDetail").classList.add("hidden");
        document.getElementById("listSales").innerHTML = "";
      } else {
        document.getElementById("rankSalesEmptyMsg").classList.add("hidden");
        document.getElementById("rankSalesDetail").classList.remove("hidden");
        renderRankHorizontalBar("sales", "chartSales", salesLabels, salesVals, function (v) {
          return fmtMoney(v);
        });
        renderOl("listSales", salesRows, function (v) { return fmtMoney(v); });
      }
    } else {
      destroyRankChart("sales");
      setSectionVisible("rankSalesCard", false);
    }

    if (hasPerm("canViewProductRanking")) {
      setSectionVisible("rankProductsCard", true);
      var prodRows = products.map(function (r) {
        return { name: r.product, val: Number(r.sales_amount || 0) };
      });
      var prodLabels = prodRows.map(function (r) { return r.name; });
      var prodVals = prodRows.map(function (r) { return r.val; });
      if (!prodRows.length) {
        destroyRankChart("products");
        document.getElementById("rankProductsEmptyMsg").classList.remove("hidden");
        document.getElementById("rankProductsDetail").classList.add("hidden");
        document.getElementById("listProducts").innerHTML = "";
      } else {
        document.getElementById("rankProductsEmptyMsg").classList.add("hidden");
        document.getElementById("rankProductsDetail").classList.remove("hidden");
        renderRankHorizontalBar("products", "chartProducts", prodLabels, prodVals, function (v) {
          return fmtMoney(v);
        });
        renderOl("listProducts", prodRows, function (v) { return fmtMoney(v); });
      }
    } else {
      destroyRankChart("products");
      setSectionVisible("rankProductsCard", false);
    }

    if (hasPerm("canViewMemberAnalysis")) {
      setSectionVisible("memberCard", true);
      const ms = document.getElementById("memberSummary");
      const uq = coreKpis ? fmtInt(coreKpis.uniqueMembers || 0) : "—";
      var topMembers = members.slice(0, 5);
      if (!topMembers.length) {
        ms.innerHTML =
          '<p class="muted">区间内去重会员约 <b>' +
          uq +
          "</b> 人。</p><p class=\"muted\">暂无会员排行明细。</p>";
      } else {
        ms.innerHTML =
          '<p class="muted">区间内去重会员约 <b>' +
          uq +
          "</b> 人。消费前列：</p><ol class=\"ol\">" +
          topMembers
            .map(function (m, i) {
                    return (
                      "<li style=\"padding-left:4px\"><span class=\"name\">" +
                      (i + 1) +
                      ". " +
                      escapeHtml(m.member_name || m.member_id || "") +
                      "</span><span>" +
                      fmtMoney(m.total_spend) +
                      "</span></li>"
                    );
                  })
            .join("") +
          "</ol>";
      }
    } else {
      setSectionVisible("memberCard", false);
    }

    if (hasPerm("canViewSleepingMembers") && sleeping && sleeping.sleepSummary) {
      setSectionVisible("sleepCard", true);
      const lines = (sleeping.sleepSummary || [])
        .map(function (row) {
          const lab = sleepLabels[row.metric] || row.metric;
          const val = row.value;
          const disp =
            typeof val === "number" && String(row.metric).indexOf("Spend") >= 0
              ? fmtMoney(val)
              : typeof val === "number"
                ? fmtInt(val)
                : escapeHtml(String(val));
          return "<div style=\"display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #e5e7eb;font-size:13px\"><span>" +
            lab +
            "</span><span>" +
            disp +
            "</span></div>";
        })
        .join("");
      document.getElementById("sleepSummary").innerHTML =
        lines || '<p class="muted">暂无沉睡会员统计</p>';
    } else {
      setSectionVisible("sleepCard", false);
    }

    setSectionVisible("agentCard", hasPerm("canUseAgentChat"));
    document.getElementById("chatFab").style.display = hasPerm("canUseAgentChat") ? "block" : "none";

    cacheForChat.coreKpis = coreKpis;
    cacheForChat.stores = stores;
    cacheForChat.sales = sales;
    cacheForChat.products = products;
    cacheForChat.members = members;
    cacheForChat.sleeping = sleeping;
  }

  function buildSalesContext(coreKpis, stores, sales, products, members, sleeping) {
    const ts = coreKpis
      ? Number(
          coreKpis.totalsales !== undefined && coreKpis.totalsales !== null
            ? coreKpis.totalsales
            : coreKpis.totalSales || 0
        )
      : 0;
    const to = coreKpis
      ? Number(
          coreKpis.totalorders !== undefined && coreKpis.totalorders !== null
            ? coreKpis.totalorders
            : coreKpis.totalOrders || 0
        )
      : 0;
    let sleepN = 0;
    let sleepA = 0;
    ((sleeping && sleeping.sleepSummary) || []).forEach(function (r) {
      if (r.metric === "Sleeping Members") sleepN = Number(r.value || 0);
      if (r.metric === "A-Class Members") sleepA = Number(r.value || 0);
    });
    return {
      updatedAt: new Date().toISOString(),
      filters: {
        startDate: state.startDate,
        endDate: state.endDate,
        stores: state.store ? [state.store] : [],
        salespeople: [],
        products: [],
        sleepingSalesperson: "",
      },
      kpis: {
        totalSales: ts,
        totalOrders: to,
        memberRegistrationRate: 0,
        repurchaseRate: 0,
        averageRepurchaseTimes: 0,
        sleepingMembers: sleepN,
        aClassSleepingMembers: sleepA,
        filesLoaded: 1,
      },
      topStores: (stores || []).map(function (r) {
        return { store: r.store, performance: Number(r.performance || 0) };
      }),
      topSalespeople: (sales || []).map(function (r) {
        return { salesperson: r.salesperson, performance: Number(r.performance || 0) };
      }),
      topProducts: (products || []).map(function (r) {
        return {
          product: r.product,
          sales_amount: Number(r.sales_amount || 0),
          sales_qty: Number(r.sales_qty || 0),
          sales_orders: Number(r.sales_orders || 0),
        };
      }),
      memberRank: (members || []).map(function (m) {
        const orders = Number(m.order_count || 0);
        const spend = Number(m.total_spend || 0);
        return {
          member_key: String(m.member_id || m.member_name || ""),
          member_name: String(m.member_name || ""),
          total_spend: spend,
          order_count: orders,
          avg_ticket: orders ? spend / orders : 0,
          repurchase_times: Math.max(0, orders - 1),
          phone: String(m.phone || ""),
          latest_store: "",
          latest_salesperson: "",
        };
      }),
      sleepList: ((sleeping && sleeping.rows) || []).slice(0, 120).map(function (r) {
        return {
          member_key: String(r.member_key || ""),
          member_name: String(r.member_name || ""),
          total_spend: Number(r.total_spend || 0),
          order_count: Number(r.order_count || 0),
          sleep_days: Number(r.sleep_days || 0),
          priority: String(r.priority || ""),
          risk_level: String(r.risk_level || ""),
          last_store: String(r.last_store || ""),
          last_salesperson: String(r.last_salesperson || ""),
          phone: String(r.phone || ""),
        };
      }),
    };
  }

  let cacheForChat = {
    coreKpis: null,
    stores: [],
    sales: [],
    products: [],
    members: [],
    sleeping: null,
  };

  async function syncChatContext() {
    if (!datasetId || !hasPerm("canUseAgentChat")) return { ok: false, error: "未开放数据助手" };
    const ctx = buildSalesContext(
      cacheForChat.coreKpis,
      cacheForChat.stores,
      cacheForChat.sales,
      cacheForChat.products,
      cacheForChat.members,
      cacheForChat.sleeping
    );
    const res = await fetch("/api/chat/context", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "same-origin",
      body: JSON.stringify({ conversationId: conversationId, salesContext: ctx }),
    });
    const data = await res.json().catch(function () { return {}; });
    if (!res.ok) return { ok: false, error: data.error || "上下文同步失败" };
    return { ok: true };
  }

  function renderChat() {
    const el = document.getElementById("chatMessages");
    el.innerHTML = chatMessages
      .map(function (m) {
        return (
          '<div class="chat-msg ' +
          (m.role === "user" ? "user" : m.role === "err" ? "err" : "agent") +
          '">' +
          escapeHtml(m.text) +
          "</div>"
        );
      })
      .join("");
    el.scrollTop = el.scrollHeight;
  }

  function setMobileDatePreset(preset) {
    if (!hasPerm("canUseFilters")) return;
    var startInput = document.getElementById("startDate");
    var endInput = document.getElementById("endDate");
    if (!startInput || !endInput) return;
    var end = new Date();
    var start = new Date();
    if (preset === "last30d") {
      start.setDate(end.getDate() - 29);
    } else if (preset === "thisMonth") {
      start = new Date(end.getFullYear(), end.getMonth(), 1);
    } else {
      start.setDate(end.getDate() - 6);
    }
    startInput.value = ymd(start);
    endInput.value = ymd(end);
    applyDateRangeFromInputs();
  }

  function applyMobileUiActions(actions) {
    if (!Array.isArray(actions) || !actions.length) return;
    actions.forEach(function (action) {
      if (action && action.type === "mobile_scroll_to" && action.targetId) {
        var target = document.getElementById(String(action.targetId));
        if (target && !target.classList.contains("hidden")) {
          target.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }
      if (action && action.type === "mobile_set_date_preset") {
        setMobileDatePreset(String(action.preset || "last7d"));
      }
    });
  }

  async function sendChat() {
    const input = document.getElementById("chatInput");
    const btn = document.getElementById("chatSend");
    const t = input.value.trim();
    if (!t) return;
    input.value = "";
    chatMessages.push({ role: "user", text: t });
    renderChat();
    btn.disabled = true;
    setButtonLoading(btn, true, "发送中...");
    try {
      const sync = await syncChatContext();
      if (!sync.ok) {
        chatMessages.push({ role: "err", text: sync.error || "同步失败" });
        renderChat();
        return;
      }
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ message: t, conversationId: conversationId }),
      });
      const data = await res.json().catch(function () { return {}; });
      if (!res.ok) {
        chatMessages.push({ role: "err", text: data.error || "请求失败" });
        showToast(data.error || "发送失败", "error");
      } else {
        chatMessages.push({ role: "agent", text: data.reply || "暂无回复" });
        applyMobileUiActions(data.uiActions);
        showToast("发送成功", "success");
      }
    } catch (e) {
      chatMessages.push({ role: "err", text: e.message || "网络异常" });
      showToast(e.message || "网络异常", "error");
    }
    setButtonLoading(btn, false);
    renderChat();
  }

  async function init() {
    const me = await fetch("/api/auth/me", { credentials: "same-origin" });
    if (!me.ok) {
      window.location.href = "/login?next=/mobile";
      return;
    }
    const meData = await me.json();
    user = meData.user;
    if (!user) {
      window.location.href = "/login?next=/mobile";
      return;
    }

    const roleMap = {
      admin: "管理员",
      manager: "经理",
      store_user: "门店用户",
      salesperson: "销售员",
      viewer: "查看者",
    };
    document.getElementById("userLabel").textContent =
      (user.displayName || user.username) + "（" + (roleMap[user.role] || user.role) + "）";

    document.getElementById("filterCard").style.display = hasPerm("canUseFilters") ? "" : "none";

    document.getElementById("logoutBtn").addEventListener("click", async function () {
      await fetch("/api/auth/logout", { method: "POST", credentials: "same-origin" });
      window.location.href = "/login";
    });

    function wireFilterUi() {
      var applyBtn = document.getElementById("applyFiltersBtn");
      if (applyBtn && !applyBtn.dataset.wired) {
        applyBtn.dataset.wired = "1";
        applyBtn.addEventListener("click", async function () {
          if (applyBtn.disabled) return;
          var datePanelEl = document.getElementById("dateRangePanel");
          var dateTriggerEl = document.getElementById("dateRangeTrigger");
          if (datePanelEl) datePanelEl.classList.add("hidden");
          if (dateTriggerEl) dateTriggerEl.setAttribute("aria-expanded", "false");
          setButtonLoading(applyBtn, true, "加载中...");
          showInlineLoading("正在加载筛选结果...");
          if (hasPerm("canUseFilters")) {
            state.startDate = document.getElementById("startDate").value || "";
            state.endDate = document.getElementById("endDate").value || "";
            state.store = document.getElementById("storeSelect").value || "";
            updateDateRangeLabel();
          }
          try {
            await loadAllData();
            showToast("筛选已更新", "success");
          } catch (e) {
            showToast((e && e.message) || "加载失败", "error");
          } finally {
            hideInlineLoading();
            setButtonLoading(applyBtn, false);
          }
        });
      }
      var dateTrigger = document.getElementById("dateRangeTrigger");
      var datePanel = document.getElementById("dateRangePanel");
      var startDateInput = document.getElementById("startDate");
      var endDateInput = document.getElementById("endDate");
      var quick7dBtn = document.getElementById("quick7d");
      var quick30dBtn = document.getElementById("quick30d");
      var quickMonthBtn = document.getElementById("quickMonth");
      if (hasPerm("canUseFilters") && dateTrigger && datePanel && startDateInput && endDateInput && !dateTrigger.dataset.wired) {
        dateTrigger.dataset.wired = "1";
        dateTrigger.addEventListener("click", function () {
          datePanel.classList.toggle("hidden");
          var open = !datePanel.classList.contains("hidden");
          dateTrigger.setAttribute("aria-expanded", open ? "true" : "false");
          if (open) {
            startDateInput.value = state.startDate;
            endDateInput.value = state.endDate;
          }
        });
        startDateInput.addEventListener("change", applyDateRangeFromInputs);
        endDateInput.addEventListener("change", applyDateRangeFromInputs);

        if (quick7dBtn) {
          quick7dBtn.addEventListener("click", function () {
            var end = new Date();
            var start = new Date();
            start.setDate(end.getDate() - 6);
            startDateInput.value = ymd(start);
            endDateInput.value = ymd(end);
            applyDateRangeFromInputs();
          });
        }
        if (quick30dBtn) {
          quick30dBtn.addEventListener("click", function () {
            var end = new Date();
            var start = new Date();
            start.setDate(end.getDate() - 29);
            startDateInput.value = ymd(start);
            endDateInput.value = ymd(end);
            applyDateRangeFromInputs();
          });
        }
        if (quickMonthBtn) {
          quickMonthBtn.addEventListener("click", function () {
            var end = new Date();
            var start = new Date(end.getFullYear(), end.getMonth(), 1);
            startDateInput.value = ymd(start);
            endDateInput.value = ymd(end);
            applyDateRangeFromInputs();
          });
        }
      }
    }

    wireFilterUi();

    datasetId = await loadLatestDataset();
    wireNotifications();
    await refreshNotifications();

    if (!datasetId) {
      updateDateRangeLabel();
      await loadAllData();
      wireChat();
      return;
    }

    if (hasPerm("canUseFilters")) {
      const opt = await loadFilterOptions().catch(function () { return null; });
      const dr = opt && opt.options ? opt.options.dateRange : null;
      dateBounds.min = (dr && dr.minDate) || "";
      dateBounds.max = (dr && dr.maxDate) || "";
      state.startDate = dateBounds.min;
      state.endDate = dateBounds.max;
      document.getElementById("startDate").value = state.startDate;
      document.getElementById("endDate").value = state.endDate;
      updateDateRangeLabel();
      populateStoreSelect((opt && opt.options && opt.options.stores) || []);
    } else {
      document.getElementById("startDate").disabled = true;
      document.getElementById("endDate").disabled = true;
      document.getElementById("storeSelect").disabled = true;
    }

    await loadAllData();
    wireChat();
  }

  function wireChat() {
    const fab = document.getElementById("chatFab");
    const panel = document.getElementById("chatPanel");
    const close = document.getElementById("chatClose");
    const send = document.getElementById("chatSend");
    const input = document.getElementById("chatInput");
    fab.addEventListener("click", function () {
      panel.classList.add("open");
    });
    close.addEventListener("click", function () {
      panel.classList.remove("open");
    });
    send.addEventListener("click", sendChat);
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") sendChat();
    });
  }

  function setNotifUnreadBadge(n) {
    var badge = document.getElementById("notifUnreadBadge");
    if (!badge) return;
    var num = Number(n || 0);
    badge.textContent = "未读 " + String(num);
    badge.style.color = num > 0 ? "#1d4ed8" : "";
  }

  function setNotifError(message) {
    var el = document.getElementById("notifList");
    if (!el) return;
    el.innerHTML = '<p class="muted" style="color:#b91c1c;">' + escapeHtml(message || "消息加载失败") + "</p>";
  }

  function renderNotifList() {
    var el = document.getElementById("notifList");
    if (!el) return;
    var rows = Array.isArray(notifCache.rows) ? notifCache.rows : [];
    if (!rows.length) {
      el.innerHTML = '<p class="muted">暂无消息</p>';
      return;
    }
    el.innerHTML = rows
      .map(function (n) {
        var unread = String(n.status || "") === "unread";
        var createdAt = n.createdAt ? new Date(n.createdAt).toLocaleString("zh-CN") : "";
        return (
          '<div data-notif-id="' +
          escapeHtml(n.id || "") +
          '" data-notif-link="' +
          escapeHtml(n.link || "/mobile") +
          '" style="border:1px solid #e5e7eb;border-radius:12px;padding:10px 10px;margin-bottom:10px;cursor:pointer;' +
          (unread ? "background:#eff6ff;border-color:#bfdbfe;" : "background:#fff;") +
          '">' +
          '<div style="display:flex;justify-content:space-between;gap:10px;align-items:center;">' +
          '<b style="font-size:14px;">' +
          escapeHtml(n.title || "") +
          "</b>" +
          (unread
            ? '<span style="font-size:12px;color:#1d4ed8;font-weight:700;">未读</span>'
            : '<span class="muted" style="font-size:12px;">已读</span>') +
          "</div>" +
          '<div class="muted" style="margin-top:6px;font-size:13px;line-height:1.45;">' +
          escapeHtml(n.content || "") +
          "</div>" +
          '<div class="muted" style="margin-top:8px;font-size:12px;">' +
          escapeHtml(createdAt) +
          "</div>" +
          "</div>"
        );
      })
      .join("");
  }

  async function refreshNotifications() {
    try {
      var data = await fetchJson("/api/notifications?limit=50&offset=0");
      notifCache = { unread: Number(data.unread || 0), rows: data.rows || [] };
      setNotifUnreadBadge(notifCache.unread);
      renderNotifList();
    } catch (e) {
      setNotifUnreadBadge(0);
      setNotifError((e && e.message) || "消息加载失败，请稍后重试");
    }
  }

  async function markNotifRead(id) {
    if (!id) return;
    try {
      await fetchJson("/api/notifications/" + encodeURIComponent(id) + "/read", { method: "POST" });
    } catch (e) {
      showToast((e && e.message) || "标记已读失败", "error");
    }
  }

  function wireNotifications() {
    var openBtn = document.getElementById("openNotifBtn");
    var panel = document.getElementById("notifPanel");
    var closeBtn = document.getElementById("notifClose");
    var list = document.getElementById("notifList");
    if (!openBtn || !panel || !closeBtn || !list) return;
    openBtn.addEventListener("click", async function () {
      panel.style.display = "flex";
      await refreshNotifications();
    });
    closeBtn.addEventListener("click", function () {
      panel.style.display = "none";
    });
    list.addEventListener("click", async function (e) {
      var card = e.target && e.target.closest("[data-notif-id]");
      if (!card) return;
      var id = card.getAttribute("data-notif-id");
      var link = card.getAttribute("data-notif-link") || "/mobile";
      await markNotifRead(id);
      await refreshNotifications();
      panel.style.display = "none";
      if (link) window.location.href = link;
    });
  }

  init().catch(function (e) {
    console.error(e);
    showBanner("warn", e.message || "加载失败");
  });
})();
  </script>
</body>
</html>
